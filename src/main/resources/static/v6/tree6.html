<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shajara v6 — OrgChart Layout</title>
    <meta name="description" content="Shajara — OrgChart.js v6 bilan interaktiv oila daraxti">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- OrgChart.js (v6 papkasidagi lokal nusxa) -->
    <script src="/v6/orgchart.js"></script>
    <!-- Override: Balkan Azure serveri o'rniga bizning /api/layout1/calculate -->
    <script src="/v6/orgchart-override.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0b1e;
            --bg2: #13132e;
            --card: #1c1c42;
            --blue: #6366f1;
            --pink: #ec4899;
            --cyan: #22d3ee;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(99, 102, 241, .2);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(13, 13, 46, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .badge {
            font-size: 10px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border: 1px solid rgba(34, 211, 238, .3);
            border-radius: 6px;
            padding: 2px 7px;
            letter-spacing: .5px;
        }

        .header-inputs {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 600px;
        }

        .inp {
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 7px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: .2s;
        }

        .inp:focus {
            border-color: var(--blue);
            background: rgba(99, 102, 241, .1);
        }

        .inp::placeholder {
            color: var(--muted);
        }

        #tokenInput {
            flex: 2;
        }

        #treeIdInput {
            flex: 1;
        }

        .btn {
            padding: 7px 18px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blue), var(--pink));
            color: #fff;
        }

        .btn-primary:hover {
            opacity: .85;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 8px;
            background: rgba(99, 102, 241, .2);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
        }

        /* ── TREE CANVAS ── */
        #tree {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ── LOADING ── */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 500;
            transition: opacity .4s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, .15);
            border-top-color: var(--blue);
            animation: spin .75s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 14px;
            color: var(--muted);
        }

        /* ── ERROR ── */
        #errorModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            z-index: 600;
            max-width: 420px;
            width: 90%;
            display: none;
        }

        #errorModal.show {
            display: block;
        }

        .err-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .err-title {
            font-size: 16px;
            font-weight: 700;
            color: #f87171;
            margin-bottom: 8px;
        }

        #errorMsg {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            word-break: break-word;
        }

        .err-close {
            margin-top: 20px;
            padding: 8px 24px;
            border-radius: 10px;
            background: rgba(239, 68, 68, .2);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #f87171;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        /* ── BACKGROUND ── */
        .bg-dots {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(99, 102, 241, .05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: .06;
            pointer-events: none;
            z-index: 0;
        }

        .glow1 {
            width: 500px;
            height: 500px;
            background: var(--blue);
            top: -180px;
            left: -180px;
        }

        .glow2 {
            width: 500px;
            height: 500px;
            background: var(--pink);
            bottom: -180px;
            right: -180px;
        }

        /* ── STATS ── */
        #stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 150;
            background: rgba(19, 19, 46, .92);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            display: none;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-val {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        /* ── TOOLBAR OVERRIDE ── */
        .boc-toolbar {
            background: rgba(19, 19, 46, .92) !important;
            backdrop-filter: blur(16px);
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
        }

        /* ── GENDER POPUP ── */
        #genderPopup {
            position: fixed;
            inset: 0;
            z-index: 700;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #genderPopup.hidden {
            display: none;
        }

        .gender-box {
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, .3);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            min-width: 280px;
        }

        .gender-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .gender-btns {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .gbtn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            font-family: inherit;
        }

        .gbtn-m {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }

        .gbtn-m:hover {
            box-shadow: 0 4px 20px rgba(59, 130, 246, .5);
            transform: translateY(-2px);
        }

        .gbtn-f {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: #fff;
        }

        .gbtn-f:hover {
            box-shadow: 0 4px 20px rgba(249, 115, 22, .5);
            transform: translateY(-2px);
        }

        .gbtn-cancel {
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        /* ── OrgChart dark overrides ── */
        [data-boc-content] {
            background: transparent !important;
        }
    </style>
</head>

<body>

    <div class="bg-dots"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">🌳 Shajara</div>
        <span class="badge">OrgChart v6</span>
        <div class="header-inputs">
            <input id="tokenInput" class="inp" type="password" placeholder="🔑 Bearer Token">
            <input id="treeIdInput" class="inp" type="number" placeholder="🌳 Tree ID">
        </div>
        <button class="btn btn-primary" id="loadBtn" onclick="loadTree()">Yuklash</button>
    </header>

    <!-- TREE CANVAS -->
    <div id="tree"></div>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Yuklanyapti...</div>
    </div>

    <!-- ERROR -->
    <div id="errorModal">
        <div class="err-icon">⚠️</div>
        <div class="err-title">Xatolik yuz berdi</div>
        <div id="errorMsg">Noma'lum xatolik</div>
        <button class="err-close" onclick="hideError()">Yopish</button>
    </div>

    <!-- STATS -->
    <div id="stats">
        <div class="stat"><span class="stat-val" id="sTotal">0</span><span class="stat-lbl">Jami</span></div>
        <div class="stat"><span class="stat-val" id="sMale">0</span><span class="stat-lbl">Erkak</span></div>
        <div class="stat"><span class="stat-val" id="sFemale">0</span><span class="stat-lbl">Ayol</span></div>
    </div>

    <!-- GENDER POPUP -->
    <div id="genderPopup" class="hidden">
        <div class="gender-box">
            <div class="gender-title">👶 Farzand jinsi</div>
            <div class="gender-btns">
                <button class="gbtn gbtn-m" onclick="confirmChild('MALE')">👦 O'g'il</button>
                <button class="gbtn gbtn-f" onclick="confirmChild('FEMALE')">👧 Qiz</button>
                <button class="gbtn gbtn-cancel" onclick="closeGender()">✕ Bekor</button>
            </div>
        </div>
    </div>

    <script>
        /* ================================================================
           SHAJARA — tree6.html
           Yondashuv:
             1. Backend /api/layout/tree/{treeId} → TreeLayoutResponseDto
             2. JS mapper → OrgChart.js nodes[] formatiga
             3. OrgChart.js o'z ichki layouti bilan SVG da render qiladi
           ================================================================ */

        var chart = null;
        var _nodeTreeIdMap = {};   // id → treeId
        var _personDataMap = {};   // id → backend person DTO
        var _pendingChildId = null;
        var _pendingChildTreeId = null;
        var _pendingChildSpouseId = null;

        /* ────────────────────────────────────────────────────────────
           INIT
        ──────────────────────────────────────────────────────────── */
        window.addEventListener('load', function () {
            showLoading(false);

            var urlToken = getParam('token');
            var urlTreeId = getParam('treeId') || getParam('id');
            if (urlToken) document.getElementById('tokenInput').value = urlToken;
            if (urlTreeId) document.getElementById('treeIdInput').value = urlTreeId;

            /* Chart ni yaratamiz */
            initChart();

            if (urlToken && urlTreeId) loadTree();
        });

        /* ────────────────────────────────────────────────────────────
           OrgChart INIT
        ──────────────────────────────────────────────────────────── */
        function initChart() {
            if (typeof OrgChart === 'undefined') {
                showError('OrgChart.js kutubxonasi yuklanmadi!');
                return;
            }

            OrgChart.templates.shajara = Object.assign({}, OrgChart.templates.ana);
            OrgChart.templates.shajara.size = [220, 110];
            OrgChart.templates.shajara.node = `
<rect x="0" y="0" width="220" height="110" rx="14" ry="14" fill="#1c1c42" stroke="{genderColor}" stroke-width="2"></rect>
<image preserveAspectRatio="xMidYMid slice" clip-path="url(#shajara_photo_clip)"
    href="{val}" x="10" y="10" width="55" height="55"></image>
<clipPath id="shajara_photo_clip">
    <circle cx="37" cy="37" r="27.5"></circle>
</clipPath>
<circle cx="37" cy="37" r="27.5" fill="none" stroke="{genderColor}" stroke-width="1.5"></circle>
<text style="font-size:13px;font-weight:700;font-family:Inter,sans-serif;" fill="#e2e8f0"
    x="78" y="32" dominant-baseline="middle">{val}</text>
<text style="font-size:11px;font-family:Inter,sans-serif;" fill="#94a3b8"
    x="78" y="52" dominant-baseline="middle">{val}</text>
<text style="font-size:10px;font-family:Inter,sans-serif;" fill="#6366f1"
    x="78" y="70" dominant-baseline="middle">{val}</text>
`;
            OrgChart.templates.shajara.field_0 = '<text style="font-size:13px;font-weight:700;font-family:Inter,sans-serif;" fill="#e2e8f0" x="78" y="32" dominant-baseline="middle">{val}</text>';
            OrgChart.templates.shajara.field_1 = '<text style="font-size:11px;font-family:Inter,sans-serif;" fill="#94a3b8" x="78" y="52" dominant-baseline="middle">{val}</text>';
            OrgChart.templates.shajara.field_2 = '<text style="font-size:10px;font-family:Inter,sans-serif;" fill="#6299f1" x="78" y="70" dominant-baseline="middle">{val}</text>';
            OrgChart.templates.shajara.img_0 = '<image preserveAspectRatio="xMidYMid slice" clip-path="url(#shajara_photo_clip)" href="{val}" x="10" y="10" width="55" height="55"></image><clipPath id="shajara_photo_clip"><circle cx="37" cy="37" r="27.5"></circle></clipPath><circle cx="37" cy="37" r="27.5" fill="none" stroke="#6366f1" stroke-width="1.5"></circle>';
            OrgChart.templates.shajara.link = '<path stroke-linejoin="round" stroke="#6366f1" stroke-width="1.5" fill="none" d="{rounded}"></path>';
            OrgChart.templates.shajara.defs = '';

            chart = new OrgChart(document.getElementById('tree'), {
                mode: 'dark',
                template: 'ula',        /* Standart template — ishonchli */
                enableSearch: true,
                enablePan: true,
                mouseScrool: OrgChart.action.ctrlZoom,
                layout: OrgChart.layout.normal,
                levelSeparation: 70,
                siblingSeparation: 25,
                subtreeSeparation: 45,

                nodeBinding: {
                    field_0: 'name',
                    field_1: 'roleLabel',
                    field_2: 'years',
                    img_0: 'photoUrl'
                },

                toolbar: {
                    zoom: true,
                    fit: true,
                    fullScreen: true
                },

                nodeMenu: {
                    addParent: {
                        text: "🔼 Ota-ona qo'sh",
                        onClick: function (nodeId) { addParent(nodeId); }
                    },
                    addSpouse: {
                        text: "💑 Juft qo'sh",
                        onClick: function (nodeId) { addSpouse(nodeId); }
                    },
                    addChild: {
                        text: "🔽 Farzand qo'sh",
                        onClick: function (nodeId) {
                            _pendingChildId = nodeId;
                            _pendingChildSpouseId = null;
                            _pendingChildTreeId = _nodeTreeIdMap[nodeId] || 0;
                            document.getElementById('genderPopup').classList.remove('hidden');
                        }
                    },
                    showMore: {
                        text: "📂 Ko'proq ko'rsatish",
                        onClick: function (nodeId) {
                            _personDataMap = {};
                            reloadTree();
                        }
                    },
                    details: { text: '📋 Batafsil' }
                },

                nodes: []
            });

            console.log('[tree6] OrgChart chart yaratildi');
        }

        /* ────────────────────────────────────────────────────────────
           TREE YUKLASH
           GET /api/layout/tree/{treeId}  →  TreeLayoutResponseDto
        ──────────────────────────────────────────────────────────── */
        function loadTree() {
            var token = getToken();
            var treeId = getTreeId();

            if (!token) { showError('Iltimos, Bearer tokenni kiriting!'); return; }
            if (!treeId) { showError('Iltimos, Tree ID ni kiriting!'); return; }

            showLoading(true);
            hideError();

            apiFetch('GET', '/api/layout/tree/' + treeId, null,
                function (data) {
                    showLoading(false);
                    mapAndRender(data);
                },
                function (err) {
                    showLoading(false);
                    showError('Yuklashda xatolik:\n' + err);
                }
            );
        }

        function reloadTree() { loadTree(); }

        /* ────────────────────────────────────────────────────────────
           MAPPER:  TreeLayoutResponseDto  →  OrgChart.js nodes[]
        ──────────────────────────────────────────────────────────── */
        function mapAndRender(dto) {
            var rawNodes = (dto && Array.isArray(dto.nodes)) ? dto.nodes : [];
            var connections = (dto && Array.isArray(dto.connections)) ? dto.connections : [];

            console.log('[mapAndRender] nodes:', rawNodes.length, 'connections:', connections.length);

            if (rawNodes.length === 0) {
                showError("Ma'lumot topilmadi yoki daraxt bo'sh.\nServer javobi: "
                    + JSON.stringify(dto).substring(0, 200));
                return;
            }

            /* ── 1. gender va spouse xaritalari ── */
            var genderMap = {}, spouseMap = {}, fidMap = {}, midMap = {};

            rawNodes.forEach(function (n) {
                genderMap[n.id] = (n.gender || 'MALE').toUpperCase();
                _personDataMap[n.id] = n;
                if (n.treeId) _nodeTreeIdMap[n.id] = n.treeId;
            });

            connections.forEach(function (c) {
                var t = (c.type || '').toUpperCase();
                if (t === 'PARENT_CHILD') {
                    if (genderMap[c.fromId] === 'FEMALE') midMap[c.toId] = c.fromId;
                    else fidMap[c.toId] = c.fromId;
                } else if (t === 'SPOUSE') {
                    if (!spouseMap[c.fromId]) spouseMap[c.fromId] = [];
                    if (!spouseMap[c.toId]) spouseMap[c.toId] = [];
                    if (spouseMap[c.fromId].indexOf(c.toId) < 0) spouseMap[c.fromId].push(c.toId);
                    if (spouseMap[c.toId].indexOf(c.fromId) < 0) spouseMap[c.toId].push(c.fromId);
                }
            });

            /* ── 2. layoutda mavjud node IDlar to'plami ── */
            var layoutIds = {};
            rawNodes.forEach(function (n) { layoutIds[n.id] = true; });

            /* ── 3. Role label xaritasi ── */
            var roleLbls = {
                CENTER: '⭐ Asosiy', FATHER: '👨 Ota', MOTHER: '👩 Ona',
                SPOUSE: '💑 Juft', CHILD: '👶 Farzand', SIBLING: '👫 Aka-uka'
            };

            /* ── 4. OrgChart node formatiga o'girish ── */
            var orgNodes = rawNodes.map(function (n) {
                /* fid/mid faqat layoutda mavjud bo'lsa */
                var fid = (fidMap[n.id] && layoutIds[fidMap[n.id]]) ? fidMap[n.id] : null;
                var mid = (midMap[n.id] && layoutIds[midMap[n.id]]) ? midMap[n.id] : null;

                /* pids faqat layoutda mavjud bo'lsa */
                var rawPids = spouseMap[n.id] || [];
                var pids = rawPids.filter(function (pid) { return layoutIds[pid]; });

                /* Yillar */
                var years = '';
                if (n.birthDate || n.diedDate) {
                    years = (n.birthDate ? getYear(n.birthDate) : '?')
                        + (n.diedDate ? ' – ' + getYear(n.diedDate) : '');
                }

                return {
                    id: n.id,
                    pid: fid || null,     /* OrgChart.js asosiy parent */
                    mid: mid,
                    pids: pids,
                    name: n.name || '—',
                    roleLabel: roleLbls[n.role] || (n.role || ''),
                    years: years,
                    birthDate: n.birthDate ? String(n.birthDate) : '',
                    diedDate: n.diedDate ? String(n.diedDate) : '',
                    photoUrl: n.photoUrl || null,
                    gender: genderMap[n.id],
                    tags: [genderMap[n.id] === 'FEMALE' ? 'female' : 'male']
                };
            });

            /* ── 5. OrgChart ga yuklash ── */
            if (!chart) { showError('Chart initsializatsiya qilinmagan!'); return; }

            chart.load(orgNodes);
            console.log('[mapAndRender] chart.load() chaqirildi,', orgNodes.length, 'node');

            /* ── 6. Statistika ── */
            document.getElementById('sTotal').textContent = orgNodes.length;
            document.getElementById('sMale').textContent = rawNodes.filter(function (n) { return (n.gender || 'MALE').toUpperCase() !== 'FEMALE'; }).length;
            document.getElementById('sFemale').textContent = rawNodes.filter(function (n) { return (n.gender || '').toUpperCase() === 'FEMALE'; }).length;
            document.getElementById('stats').style.display = 'flex';
        }

        /* ────────────────────────────────────────────────────────────
           API ACTIONS
        ──────────────────────────────────────────────────────────── */
        function addParent(nodeId) {
            var treeId = _nodeTreeIdMap[nodeId] || Number(getTreeId()) || 0;
            if (!treeId) { showError('Node uchun Tree ID topilmadi!'); return; }

            apiFetch('POST', '/api/persons/add-parent',
                { id: Number(nodeId), fatherId: null, motherId: null, treeId: treeId },
                function () {
                    _personDataMap = {};
                    reloadTree();
                },
                function (err) { showError("Ota-ona qo'shishda xatolik:\n" + err); }
            );
        }

        function addSpouse(nodeId) {
            var treeId = _nodeTreeIdMap[nodeId] || Number(getTreeId()) || 0;
            if (!treeId) { showError('Node uchun Tree ID topilmadi!'); return; }

            apiFetch('POST', '/api/persons/add-spouse',
                { id: Number(nodeId), treeId: treeId },
                function () {
                    _personDataMap = {};
                    reloadTree();
                },
                function (err) { showError("Juft qo'shishda xatolik:\n" + err); }
            );
        }

        function confirmChild(gender) {
            closeGender();
            if (!_pendingChildId) { showError('Node tanlanmagan!'); return; }

            var treeId = _nodeTreeIdMap[_pendingChildId] || _pendingChildTreeId || 0;
            if (!treeId) { showError('Tree ID topilmadi!'); return; }

            apiFetch('POST', '/api/persons/add-child',
                {
                    id: Number(_pendingChildId),
                    spouseId: _pendingChildSpouseId ? Number(_pendingChildSpouseId) : null,
                    childGender: gender,
                    treeId: treeId
                },
                function () {
                    _pendingChildId = null;
                    _pendingChildTreeId = null;
                    _pendingChildSpouseId = null;
                    _personDataMap = {};
                    reloadTree();
                },
                function (err) { showError("Farzand qo'shishda xatolik:\n" + err); }
            );
        }

        function closeGender() {
            document.getElementById('genderPopup').classList.add('hidden');
        }

        /* ────────────────────────────────────────────────────────────
           UNIVERSAL FETCH HELPER
        ──────────────────────────────────────────────────────────── */
        function apiFetch(method, url, body, onOk, onErr) {
            var token = getToken();
            if (!token) { onErr('Token kiritilmagan!'); return; }

            var opts = {
                method: method,
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            };
            if (body && (method === 'POST' || method === 'PUT')) {
                opts.body = JSON.stringify(body);
            }

            fetch(url, opts)
                .then(function (res) {
                    if (!res.ok) {
                        return res.text().then(function (t) {
                            try {
                                var j = JSON.parse(t);
                                t = j.message || j.error || JSON.stringify(j);
                            } catch (e) { /* plain text */ }
                            onErr(res.status + ' ' + res.statusText + ':\n' + t);
                        });
                    }
                    if (res.status === 204) { onOk(null); return; }
                    var ct = res.headers.get('content-type') || '';
                    if (ct.indexOf('application/json') >= 0) {
                        return res.json().then(function (d) { onOk(d); });
                    }
                    return res.text().then(function () { onOk(null); });
                })
                .catch(function (e) {
                    onErr('Tarmoq xatosi: ' + (e.message || e));
                });
        }

        /* ────────────────────────────────────────────────────────────
           HELPERS
        ──────────────────────────────────────────────────────────── */
        function getYear(d) {
            if (!d) return '';
            if (Array.isArray(d)) return String(d[0]);
            if (typeof d === 'string') return d.substring(0, 4);
            return '';
        }

        function showLoading(v) {
            document.getElementById('loading').classList.toggle('hidden', !v);
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorModal').classList.add('show');
        }

        function hideError() {
            document.getElementById('errorModal').classList.remove('show');
        }

        function getToken() { return document.getElementById('tokenInput').value.trim(); }

        function getTreeId() {
            return document.getElementById('treeIdInput').value.trim()
                || getParam('treeId')
                || getParam('id')
                || '';
        }

        function getParam(k) {
            return new URLSearchParams(location.search).get(k);
        }
    </script>
