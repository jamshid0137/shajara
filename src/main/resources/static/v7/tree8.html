<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shajara — Oila Daraxti (Oflayn v7)</title>
    <meta name="description" content="Shajara — FamilyTree.js oflayn rejimda oila daraxti vizualizatsiyasi">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FamilyTree.js (lokal nusxa, GitHub: BALKANGraph/FamilyTreeJS) -->
    <script src="/v7/familytree.js"></script>
    <!-- Override: Balkan Azure serveri o'rniga bizning /api/layout1new/calculate -->
    <script src="/v7/familytree-override.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Matn va rasmlar o'z-o'zidan yo'qolmasligi uchun */
        [data-n-id] text,
        [data-n-id] image {
            opacity: 1 !important;
            display: block !important;
            visibility: visible !important;
        }

        :root {
            --bg: #0b0b1e;
            --bg2: #13132e;
            --card: #1c1c42;
            --blue: #6366f1;
            --pink: #ec4899;
            --cyan: #22d3ee;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(99, 102, 241, .2);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(13, 13, 46, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .header-inputs {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 600px;
        }

        .inp {
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 7px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: .2s;
        }

        .inp:focus {
            border-color: var(--blue);
            background: rgba(99, 102, 241, .1);
        }

        .inp::placeholder {
            color: var(--muted);
        }

        #tokenInput {
            flex: 2;
        }

        #treeIdInput {
            flex: 1;
        }

        .btn {
            padding: 7px 18px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blue), var(--pink));
            color: #fff;
        }

        .btn-primary:hover {
            opacity: .85;
            transform: translateY(-1px);
        }

        /* TREE */
        #tree {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* LOADING */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 500;
            transition: opacity .4s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, .15);
            border-top-color: var(--blue);
            animation: spin .75s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 14px;
            color: var(--muted);
        }

        /* ERROR */
        #errorModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            z-index: 600;
            max-width: 420px;
            width: 90%;
            display: none;
        }

        #errorModal.show {
            display: block;
        }

        .err-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .err-title {
            font-size: 16px;
            font-weight: 700;
            color: #f87171;
            margin-bottom: 8px;
        }

        #errorMsg {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            word-break: break-word;
        }

        .err-close {
            margin-top: 20px;
            padding: 8px 24px;
            border-radius: 10px;
            background: rgba(239, 68, 68, .2);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #f87171;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        /* BACKGROUND */
        .bg-dots {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(99, 102, 241, .05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: .06;
            pointer-events: none;
            z-index: 0;
        }

        .glow1 {
            width: 500px;
            height: 500px;
            background: var(--blue);
            top: -180px;
            left: -180px;
        }

        .glow2 {
            width: 500px;
            height: 500px;
            background: var(--pink);
            bottom: -180px;
            right: -180px;
        }

        /* FAMILYTREE.JS dark overrides */
        .bft-edit-form {
            font-family: 'Inter', sans-serif !important;
            background: rgba(19, 19, 46, .98) !important;
            border-left: 1px solid var(--border) !important;
        }

        .bft-edit-form-header {
            background: rgba(99, 102, 241, .25) !important;
        }

        /* GENDER POPUP */
        #genderPopup {
            position: fixed;
            inset: 0;
            z-index: 700;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #genderPopup.hidden {
            display: none;
        }

        .gender-box {
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, .3);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            min-width: 280px;
        }

        .gender-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .gender-btns {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .gbtn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            font-family: inherit;
        }

        .gbtn-m {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }

        .gbtn-m:hover {
            box-shadow: 0 4px 20px rgba(59, 130, 246, .5);
            transform: translateY(-2px);
        }

        .gbtn-f {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: #fff;
        }

        .gbtn-f:hover {
            box-shadow: 0 4px 20px rgba(249, 115, 22, .5);
            transform: translateY(-2px);
        }

        .gbtn-cancel {
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        /* STATS */
        #stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 150;
            background: rgba(19, 19, 46, .92);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            display: none;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-val {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        /* CUSTOM TREE MENU POPUP */
        #customTreeMenuPopup {
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            min-width: 210px;
        }
        #customTreeMenuPopup .cmenu-title {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            margin: 4px 8px 8px;
            letter-spacing: 0.5px;
        }
        #customTreeMenuPopup button {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            font-family: inherit;
        }
        #customTreeMenuPopup button:hover {
            background: rgba(99, 102, 241, .15);
            color: #fff;
        }

        /* ── SVG LINES PROXIMITY EFFECT (JS boshqaradi) ── */
        path {
            cursor: pointer;
            transition: stroke 0.2s, stroke-width 0.2s;
        }
    </style>
</head>

<body>

    <div class="bg-dots"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">🌳 Shajara</div>
        <div class="header-inputs">
            <input id="tokenInput" class="inp" type="password" placeholder="🔑 Bearer Token">
            <input id="treeIdInput" class="inp" type="number" placeholder="🆔 Tree ID">
        </div>
        <button class="btn btn-primary" onclick="reloadTree(null)">Yuklash</button>
    </header>

    <!-- TREE CANVAS -->
    <div id="tree"></div>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Yuklanyapti...</div>
    </div>

    <!-- ERROR -->
    <div id="errorModal">
        <div class="err-icon">⚠️</div>
        <div class="err-title">Xatolik yuz berdi</div>

    </div>

    <!-- STATS -->
    <div id="stats">
        <div class="stat"><span class="stat-val" id="sTotal">0</span><span class="stat-lbl">Jami</span></div>
        <div class="stat"><span class="stat-val" id="sSpouse">0</span><span class="stat-lbl">Juftlar</span></div>
        <div class="stat"><span class="stat-val" id="sChild">0</span><span class="stat-lbl">Farzandlar</span></div>
    </div>

    <!-- GENDER POPUP -->
    <div id="genderPopup" class="hidden">
        <div class="gender-box">
            <div class="gender-title">👶 Farzand jinsi</div>
            <div class="gender-btns">
                <button class="gbtn gbtn-m" onclick="confirmChild('MALE')">👦 O'g'il</button>
                <button class="gbtn gbtn-f" onclick="confirmChild('FEMALE')">👧 Qiz</button>
                <button class="gbtn gbtn-cancel" onclick="closeGender()">✕ Bekor</button>
            </div>

    <script>
        /* ================================================================
           SHAJARA — tree7.html JavaScript
           FamilyTree.js (GitHub: BALKANGraph/FamilyTreeJS) — OFLAYN rejim
           familytree-override.js → /api/layout1new/calculate (lokal Spring Boot)
           Yondashuv: O'rtada JS MAPPER
           - Backend DTOlari o'zgarmaydi
           - TreeLayoutResponseDto → FamilyTree.js format — JS da maplanadi
           - add-parent/spouse/child → to'g'ri DTO yuboriladi → reloadTree()
           ================================================================ */

        var chart = null;
        var _pendingChildId = null;
        var _pendingChildTreeId = null;
        var _pendingChildSpouseId = null; // faqat juft nodeda null emas
        /* Hozir chartda yuklangan barcha FamilyTree-format nodelar (id → node) */
        var _loadedFtNodes = {};
        /* Har bir nodening treeId si (id → treeId) */
        var _nodeTreeIdMap = {};
        /* GLOBAL spouse xaritasi: id → [spouseId1, spouseId2, ...] (connections dan to'g'ridan-to'g'ri) */
        var _spouseMapGlobal = {};

        /* ────────────────────────────────────────────────────────────
           INIT
        ──────────────────────────────────────────────────────────── */
        window.addEventListener('load', function () {
            showLoading(false);

            var urlToken = getParam('token');
            var urlTreeId = getParam('treeId') || getParam('id');
            if (urlToken) document.getElementById('tokenInput').value = urlToken;
            if (urlTreeId) document.getElementById('treeIdInput').value = urlTreeId;

            initChart();
            setupPathProximity(); /* Chiziqqa yaqinlik detection */

            if (urlToken && urlTreeId) loadTree();
        });

        /* ────────────────────────────────────────────────────────────
           PROXIMITY HIGHLIGHT
           Chiziqdan PROXIMITY_PX (screen px) masofada bo'lganda yashil.
           getPointAtLength + getScreenCTM → aniq screen koordinat.
        ──────────────────────────────────────────────────────────── */
        function setupPathProximity() {
            var container = document.getElementById('tree');
            if (!container || container._proximityBound) return;
            container._proximityBound = true;

            var PROXIMITY_PX = 6;    /* sichqonchen chiziqqa maksimal masofa (px) */
            var STEPS        = 40;   /* har bir path bo'ylab qancha nuqta tekshiriladi */
            var highlighted  = [];   /* hozir yashil bo'lgan path lar */
            var rafId        = null; /* requestAnimationFrame ID */

            function checkProximity(mx, my) {
                var svg = container.querySelector('svg');
                if (!svg) return;

                /* Faqat bog'lovchi chiziqlar: fill="none" yoki stroke bo'lgan path lar */
                var paths = svg.querySelectorAll('path[fill="none"]');
                var newHL = [];

                for (var pi = 0; pi < paths.length; pi++) {
                    var path = paths[pi];
                    var len = 0;
                    try { len = path.getTotalLength(); } catch(e) { continue; }
                    if (len <= 0) continue;

                    var ctm;
                    try { ctm = path.getScreenCTM(); } catch(e) { continue; }
                    if (!ctm) continue;

                    var steps = Math.min(STEPS, Math.max(5, Math.floor(len / 8)));
                    var minDist = Infinity;

                    for (var s = 0; s <= steps; s++) {
                        var local  = path.getPointAtLength((s / steps) * len);
                        var screen = local.matrixTransform(ctm);
                        var dx = screen.x - mx;
                        var dy = screen.y - my;
                        var d  = Math.sqrt(dx * dx + dy * dy);
                        if (d < minDist) minDist = d;
                        if (minDist < PROXIMITY_PX) break; /* erta chiqish */
                    }

                    if (minDist < PROXIMITY_PX) newHL.push(path);
                }

                /* Avvalgini o'chir */
                highlighted.forEach(function(p) {
                    if (newHL.indexOf(p) === -1) {
                        p.style.stroke      = '';
                        p.style.strokeWidth = '';
                    }
                });
                /* Yangini yoq */
                newHL.forEach(function(p) {
                    p.style.stroke      = '#22c55e';
                    p.style.strokeWidth = '8px';
                });
                highlighted = newHL;
            }

            container.addEventListener('mousemove', function(e) {
                var mx = e.clientX, my = e.clientY;
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(function() {
                    checkProximity(mx, my);
                    rafId = null;
                });
            });

            container.addEventListener('mouseleave', function() {
                if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                highlighted.forEach(function(p) {
                    p.style.stroke      = '';
                    p.style.strokeWidth = '';
                });
                highlighted = [];
            });
        }

        /* ────────────────────────────────────────────────────────────
           FAMILYTREE.JS INIT
        ──────────────────────────────────────────────────────────── */
        function initChart() {
            if (typeof FamilyTree === 'undefined') {
                showError('FamilyTree.js yuklanmadi! /v7/familytree.js tekshiring.');
                return;
            }

            function getTransformXY(el) {
                const t = el.getAttribute('transform');
                if (!t) return {x:0, y:0};
                let m = t.match(/matrix\(([^)]+)\)/);
                if (m) {
                    let p = m[1].split(',');
                    return {x: parseFloat(p[4]), y: parseFloat(p[5])};
                }
                m = t.match(/translate\(([^,]+),?\s*([^)]+)?\)/);
                if (m) {
                    return {x: parseFloat(m[1]), y: m[2] ? parseFloat(m[2]) : 0};
                }
                return {x:0, y:0};
            }

            // Custom Drawing (Chizma) for Adding Nodes
            window._openCustomTreeMenu = function(e, id) {
                e.stopPropagation();
                
                var old = document.getElementById('customTreeMenuGroup');
                if (old) old.remove();

                setTimeout(function() {
                    document.addEventListener('click', function closeMenu(ev) {
                        var m = document.getElementById('customTreeMenuGroup');
                        if (m) m.remove();
                        document.removeEventListener('click', closeMenu);
                    });
                }, 10);

                var nodeObj = _loadedFtNodes[id];
                var nodeEl = document.querySelector('[data-n-id="' + id + '"]');
                if (!nodeEl || !nodeObj) return;

                var pos = getTransformXY(nodeEl);
                var nx = pos.x, ny = pos.y;
                var nw = 216, nh = 90; // Tommy size

                var ns = "http://www.w3.org/2000/svg";
                var group = document.createElementNS(ns, "g");
                group.setAttribute("id", "customTreeMenuGroup");

                function createBtn(text, bx, by, color, actionFn, labelText) {
                    var g = document.createElementNS(ns, "g");
                    g.setAttribute("style", "cursor:pointer; pointer-events:all;");
                    g.addEventListener('click', function(ev) {
                        ev.stopPropagation();
                        if (group) group.remove();
                        actionFn();
                    });

                    var circle = document.createElementNS(ns, "circle");
                    circle.setAttribute("cx", bx);
                    circle.setAttribute("cy", by);
                    circle.setAttribute("r", "16");
                    circle.setAttribute("fill", "#1c1c42");
                    circle.setAttribute("stroke", color);
                    circle.setAttribute("stroke-width", "2");
                    g.appendChild(circle);

                    var txt = document.createElementNS(ns, "text");
                    txt.setAttribute("x", bx);
                    txt.setAttribute("y", by + 6);
                    txt.setAttribute("text-anchor", "middle");
                    txt.setAttribute("font-size", "18");
                    txt.setAttribute("fill", color);
                    txt.setAttribute("font-weight", "bold");
                    txt.setAttribute("font-family", "Arial");
                    txt.textContent = text;
                    g.appendChild(txt);

                    if (labelText) {
                        var lbl = document.createElementNS(ns, "text");
                        lbl.setAttribute("x", bx);
                        lbl.setAttribute("y", by + 28);
                        lbl.setAttribute("text-anchor", "middle");
                        lbl.setAttribute("font-size", "11");
                        lbl.setAttribute("fill", "#fff");
                        lbl.textContent = labelText;
                        g.appendChild(lbl);
                    }

                    var hov = document.createElementNS(ns, "circle");
                    hov.setAttribute("cx", bx);
                    hov.setAttribute("cy", by);
                    hov.setAttribute("r", "20");
                    hov.setAttribute("fill", "transparent");
                    g.appendChild(hov);
                    
                    group.appendChild(g);
                }

                function drawLine(x1, y1, x2, y2, color) {
                    var line = document.createElementNS(ns, "line");
                    line.setAttribute("x1", x1);
                    line.setAttribute("y1", y1);
                    line.setAttribute("x2", x2);
                    line.setAttribute("y2", y2);
                    line.setAttribute("stroke", color);
                    line.setAttribute("stroke-width", "2");
                    line.setAttribute("stroke-dasharray", "4,4");
                    group.appendChild(line);
                }

                function createCard(title, bx, by, color, actionFn, subLabel, iconChar) {
                    var g = document.createElementNS(ns, "g");
                    g.setAttribute("style", "cursor:pointer; pointer-events:all; transition: opacity 0.2s;");
                    g.addEventListener('click', function(ev) {
                        ev.stopPropagation();
                        if (group) group.remove();
                        if (actionFn) actionFn();
                    });
                    
                    var w = 216, h = 90;

                    var rect = document.createElementNS(ns, "rect");
                    rect.setAttribute("x", bx - w/2);
                    rect.setAttribute("y", by);
                    rect.setAttribute("width", w);
                    rect.setAttribute("height", h);
                    rect.setAttribute("fill", "#1c1c42"); 
                    rect.setAttribute("stroke", color);
                    rect.setAttribute("stroke-width", "1");
                    rect.setAttribute("rx", "5");
                    g.appendChild(rect);

                    var txt = document.createElementNS(ns, "text");
                    txt.setAttribute("x", bx + w/2 - 15);
                    txt.setAttribute("y", by + 25);
                    txt.setAttribute("text-anchor", "end");
                    txt.setAttribute("font-size", "14");
                    txt.setAttribute("fill", color);
                    txt.setAttribute("font-family", "Arial");
                    txt.textContent = title;
                    g.appendChild(txt);

                    var actualIcon = iconChar;
                    if (!actualIcon) {
                        actualIcon = (title.indexOf("Qiz") > -1 || title.indexOf("daughter") > -1) ? "👩" : "👨";
                    }

                    var icon = document.createElementNS(ns, "text");
                    icon.setAttribute("x", bx - w/2 + 40);
                    icon.setAttribute("y", by + 55);
                    icon.setAttribute("text-anchor", "middle");
                    icon.setAttribute("font-size", "36");
                    icon.textContent = actualIcon;
                    g.appendChild(icon);

                    if (subLabel) {
                        var subTxt = document.createElementNS(ns, "text");
                        subTxt.setAttribute("x", bx + 10);
                        subTxt.setAttribute("y", by + 65);
                        subTxt.setAttribute("text-anchor", "middle");
                        subTxt.setAttribute("font-size", "12");
                        subTxt.setAttribute("fill", "#bbb");
                        subTxt.setAttribute("font-family", "Arial");
                        subTxt.textContent = "(" + subLabel + ")";
                        g.appendChild(subTxt);
                    }

                    group.appendChild(g);
                }

                var colorSpouse = "#039be5";
                var colorParent = "#039be5";
                var colorMale = "#039be5";
                var colorFemale = "#f57c00";

                // 1. Parent Btn (Top)
                drawLine(nx + nw/2, ny, nx + nw/2, ny - 40, colorParent);
                createBtn("+", nx + nw/2, ny - 40, colorParent, function() { addParent(id); }, "Ota-ona");

                // 2. Spouse Left Btn
                drawLine(nx, ny + nh/2, nx - 40, ny + nh/2, colorSpouse);
                createBtn("+", nx - 40, ny + nh/2, colorSpouse, function() { addSpouse(id); }, "");

                // 3. Spouse Right Btn
                drawLine(nx + nw, ny + nh/2, nx + nw + 40, ny + nh/2, colorSpouse);
                createBtn("+", nx + nw + 40, ny + nh/2, colorSpouse, function() { addSpouse(id); }, "");

                // === 4. Har bir spouse uchun alohida ustun (fixed horizontal spacing) ===

                // spouseId bo'yicha mavjud farzandlarni topish
                var getExistingChildren = function(spouseId) {
                    var result = [];
                    for (var cId in _loadedFtNodes) {
                        var ch = _loadedFtNodes[cId];
                        if (String(cId) === String(id)) continue;
                        var isChild = (String(ch.fid) === String(id) || String(ch.mid) === String(id));
                        if (!isChild) continue;
                        var otherP = (String(ch.fid) === String(id)) ? ch.mid : ch.fid;
                        if (spouseId === null) {
                            var myPids2 = (nodeObj.pids || []).map(String);
                            if (!otherP || myPids2.indexOf(String(otherP)) === -1) result.push(ch);
                        } else {
                            if (String(otherP) === String(spouseId)) result.push(ch);
                        }
                    }
                    return result;
                };

                // === GLOBAL spouseMap dan spouse IDlarini olamiz (ENG ISHONCHLI) ===
                // _spouseMapGlobal mapAndRender da backend CONNECTIONS dan to'ldirilgan
                var rawSpouseIds = (_spouseMapGlobal[String(id)] || []).slice();
                console.log('[customMenu] _spouseMapGlobal[' + id + ']:', JSON.stringify(rawSpouseIds));

                var columns = [];
                if (rawSpouseIds.length > 0) {
                    for (var sii = 0; sii < rawSpouseIds.length; sii++) {
                        var spId = String(rawSpouseIds[sii]);
                        var spNodeObj = _loadedFtNodes[spId];
                        columns.push({
                            spouseId: spId,
                            label: spNodeObj ? (spNodeObj.name || 'Juft') : ('ID:' + spId)
                        });
                    }
                } else {
                    // Spouse yo'q — bitta ustun (juft ko'rsatmasdan)
                    columns.push({ spouseId: null, label: '' });
                }
                console.log('[customMenu] columns:', columns.length, columns.map(function(c){ return c.label; }));


                // Horizontal spacing: card kengligi 216, oraliq 8
                var CARD_W = 216;
                var COL_GAP = 8;
                var COL_STEP = CARD_W + COL_GAP;
                var totalColsWidth = columns.length * CARD_W + (columns.length - 1) * COL_GAP;

                // Ustunlar pozitsiyasi: main node markaziga nisbatan chapga/o'ngga
                var firstColLeft = (nx + nw / 2) - totalColsWidth / 2;

                // Barcha ustunlar bir xil Y da boshlanadi
                var colBaseY = ny + nh + 40;

                // Har bir ustunni chizish (IIFE bilan closure muammosini yopamiz)
                for (var ci = 0; ci < columns.length; ci++) {
                    (function(col, colIndex) {
                        var colLeft = firstColLeft + colIndex * COL_STEP; // rect chap qirrasi
                        var colMidX = colLeft + CARD_W / 2;               // ustun markazi

                        var curY = colBaseY;

                        // ── Asosiy noddan ushbu ustun tepasiga yo'naltiruvchi chiziq ──
                        var anchorX = nx + nw / 2;
                        var anchorY = ny + nh;
                        var elbowY  = anchorY + 20;
                        var guidePath = document.createElementNS(ns, "path");
                        guidePath.setAttribute("d",
                            "M " + anchorX + " " + anchorY +
                            " L " + anchorX + " " + elbowY  +
                            " L " + colMidX  + " " + elbowY  +
                            " L " + colMidX  + " " + curY
                        );
                        guidePath.setAttribute("fill", "none");
                        guidePath.setAttribute("stroke", "#555");
                        guidePath.setAttribute("stroke-width", "1.5");
                        guidePath.setAttribute("stroke-dasharray", "4,3");
                        group.appendChild(guidePath);

                        // ── Spouse ismi sarlavhasi ──
                        if (col.spouseId !== null) {
                            var spTxt = document.createElementNS(ns, "text");
                            spTxt.setAttribute("x", colMidX);
                            spTxt.setAttribute("y", curY - 6);
                            spTxt.setAttribute("text-anchor", "middle");
                            spTxt.setAttribute("font-size", "11");
                            spTxt.setAttribute("fill", "#aaa");
                            spTxt.setAttribute("font-family", "Arial");
                            var lbl = col.label.length > 18 ? col.label.substring(0, 16) + ".." : col.label;
                            spTxt.textContent = lbl + " bilan";
                            group.appendChild(spTxt);
                        }

                        // ── Add son ──
                        createCard("Add son", colMidX, curY, colorMale,
                            (function(sid) {
                                return function() {
                                    _pendingChildId = id;
                                    _pendingChildSpouseId = sid;
                                    _pendingChildTreeId = _nodeTreeIdMap[id] || Number(getTreeId());
                                    confirmChild('MALE');
                                };
                            })(col.spouseId),
                            null, "👨");
                        curY += 90;

                        // connector
                        var conn1 = document.createElementNS(ns, "line");
                        conn1.setAttribute("x1", colMidX); conn1.setAttribute("y1", curY);
                        conn1.setAttribute("x2", colMidX); conn1.setAttribute("y2", curY + 8);
                        conn1.setAttribute("stroke", "#555"); conn1.setAttribute("stroke-width", "1.5");
                        group.appendChild(conn1);
                        curY += 8;

                        // ── Add daughter ──
                        createCard("Add daughter", colMidX, curY, colorFemale,
                            (function(sid) {
                                return function() {
                                    _pendingChildId = id;
                                    _pendingChildSpouseId = sid;
                                    _pendingChildTreeId = _nodeTreeIdMap[id] || Number(getTreeId());
                                    confirmChild('FEMALE');
                                };
                            })(col.spouseId),
                            null, "👩");
                        curY += 90;

                        // ── Mavjud farzandlar ──
                        var kids = getExistingChildren(col.spouseId);
                        if (kids.length > 0) {
                            var conn2 = document.createElementNS(ns, "line");
                            conn2.setAttribute("x1", colMidX); conn2.setAttribute("y1", curY);
                            conn2.setAttribute("x2", colMidX); conn2.setAttribute("y2", curY + 12);
                            conn2.setAttribute("stroke", "#555"); conn2.setAttribute("stroke-width", "1.5");
                            group.appendChild(conn2);
                            curY += 12;

                            var kidLbl = document.createElementNS(ns, "text");
                            kidLbl.setAttribute("x", colMidX);
                            kidLbl.setAttribute("y", curY + 5);
                            kidLbl.setAttribute("text-anchor", "middle");
                            kidLbl.setAttribute("font-size", "10");
                            kidLbl.setAttribute("fill", "#888");
                            kidLbl.setAttribute("font-family", "Arial");
                            kidLbl.textContent = "Mavjud (" + kids.length + ")";
                            group.appendChild(kidLbl);
                            curY += 18;

                            for (var ki = 0; ki < kids.length; ki++) {
                                (function(kid) {
                                    var conn3 = document.createElementNS(ns, "line");
                                    conn3.setAttribute("x1", colMidX); conn3.setAttribute("y1", curY);
                                    conn3.setAttribute("x2", colMidX); conn3.setAttribute("y2", curY + 8);
                                    conn3.setAttribute("stroke", "#555"); conn3.setAttribute("stroke-width", "1.5");
                                    group.appendChild(conn3);
                                    curY += 8;

                                    var isFem = kid.tags && kid.tags.indexOf('female') !== -1;
                                    var kTitle = (kid.name || '—').substring(0, 18);
                                    createCard(kTitle, colMidX, curY,
                                        isFem ? colorFemale : colorMale,
                                        function() { chart.center(kid.id); },
                                        kid.years || '', isFem ? "👧" : "👦");
                                    curY += 90;
                                })(kids[ki]);
                            }
                        }
                    })(columns[ci], ci);
                }




                nodeEl.parentNode.appendChild(group);
            };

            // Inject custom SVG Node Button to 'tommy' template (w=216)
            FamilyTree.templates.tommy.customTreeMenuBtn = 
                '<g style="cursor:pointer;" onclick="window._openCustomTreeMenu(event, \'{id}\')"><circle cx="216" cy="12" r="14" fill="#039be5" /><circle cx="223" cy="19" r="6" fill="#fff" /><path d="M220 18.25h6v1.5h-6z" fill="#039be5" /><path d="M222.25 16v6h1.5v-6z" fill="#039be5" /><path d="M216 4a4 4 0 100 8 4 4 0 000-8zm-6 13c0-2.5 3.5-4 6-4s6 1.5 6 4v1h-12z" fill="#fff" /></g>';

            /* global handler — nodeMenu onclick uchun */
            window._showRelClick = function (e, nodeId) {
                e.stopPropagation();
                if (typeof showRelatives === 'function') showRelatives(nodeId);
            };

            chart = new FamilyTree(document.getElementById('tree'), {
                mode: 'dark',
                template: 'tommy',
                enableSearch: true,
                enablePan: true,
                mouseScrool: FamilyTree.action.zoom,
                lazyLoading: false,

                nodeBinding: {
                    field_0: 'name',
                    field_1: 'roleLabel',
                    field_2: 'years',
                    img_0: 'photoUrl',
                    customTreeMenuBtn: 'alwaysShow'
                },

                editForm: {
                    readOnly: false,
                    titleBinding: 'name',
                    photoBinding: 'photoUrl',
                    buttons: {
                        edit: { icon: FamilyTree.icon.edit(24, 24, '#fff'), text: 'Tahrirlash' },
                        details: { icon: FamilyTree.icon.details(24, 24, '#fff'), text: 'Batafsil' },
                        remove: { icon: FamilyTree.icon.remove(24, 24, '#fff'), text: "O'chirish" }
                    },
                    elements: [
                        { type: 'textbox', label: 'Ism', binding: 'name' },
                        { type: 'textbox', label: "Tug'ilgan", binding: 'birthDate' },
                        { type: 'textbox', label: 'Vafot', binding: 'diedDate' },
                        { type: 'textbox', label: 'Rasm URL', binding: 'photoUrl' }
                    ]
                },

                toolbar: { zoom: true, fit: true, fullScreen: true },

                // nodeTreeMenu: FALSE — bu belgi bosilganda FamilyTree.js o'z layout
                // algoritmini ishga tushiradi (placeholder nodelar qo'shadi) va
                // backend joylashuvlarimizni buzadi. Shuning uchun o'chirildi.
                // Buning o'rniga nodeMenu'dagi "📂 Markaz qilish" ishlatiladi.
                nodeTreeMenu: false,

                /* ── Node o'ng-klik menyu ── */
                nodeMenu: {
                    showRelMenu: {
                        text: "📂 Markaz qilish",
                        onClick: function (nodeId) {
                            window.lastPersonId = nodeId;  /* oxirgi bosilgan person ni eslab qolish */
                            _loadedFtNodes = {};   /* keshni tozalash */

                            // ── MUHIM: treeId topib inputga o'rnatish qo'shildi! ──
                            var tId = _nodeTreeIdMap[nodeId];
                            if (tId && !document.getElementById('treeIdInput').value) {
                                document.getElementById('treeIdInput').value = tId;
                            }

                            loadTree(null);        /* butun daraxtni qayta yuklash (full redraw) */
                        }
                    },
                    addParentMenu: {
                        text: "🔼 Ota-ona qo'sh",
                        onClick: function (nodeId) { addParent(nodeId); }
                    },
                    addSpouseMenu: {
                        text: "💑 Juft qo'sh",
                        onClick: function (nodeId) { addSpouse(nodeId); }
                    },
                    addChildMenu: {
                        text: "🔽 Farzand qo'sh",
                        onClick: function (nodeId) {
                            _pendingChildId = nodeId;
                            _pendingChildSpouseId = null; // nodeMenu da doim yolg'iz
                            _pendingChildTreeId = _nodeTreeIdMap[nodeId] || Number(getTreeId());
                            document.getElementById('genderPopup').classList.remove('hidden');
                        }
                    },
                    details: { text: '📋 Batafsil' }
                },

                nodes: []
            });

            /* nodeTreeMenu o'chirildi — false qilingan (nodeMenu ishlatiladi) */

            /* ── UPDATE va DELETE eventlari ──
               FamilyTree.js yangi API: chart.on('update', fn)
               fn argumentlari: (sender, args)
               args = { addNodesData:[], updateNodesData:[], removeNodeId: id|null }
            */
            chart.on('update', function (sender, args) {

                /* ─── ADD ─── */
                if (args.addNodesData && args.addNodesData.length > 0) {
                    var addedNode = args.addNodesData[0];
                    // ⚠️ JSON.stringify ishlatmang! FamilyTree ichki ob'yektlarida circular reference bor
                    console.log('[update ADD] node id:', addedNode.id,
                        '| fid:', addedNode.fid, '| mid:', addedNode.mid,
                        '| pids:', JSON.stringify(addedNode.pids));

                    var isParent = false, isChild = false, isSpouse = false;
                    var baseNodeId = null;

                    /* ================================================================
                       ANIQLASH TARTIBI (MUHIM — o'zgartirmang):
                       ─────────────────────────────────────────
                       1️⃣  PARENT  — updateNodesData da biror MAVJUD node ning
                           fid YOKI mid = addedNode.id bo'lsa.
                           Bu FamilyTree.js "add father/mother" placeholder uchun
                           ENG ISHONCHLI signal. BIRINCHI tekshiriladi.
                           SABAB: nodeTreeMenu da yangi ota placeholder yaratilganda
                           FamilyTree.js unga child ning mavjud motherId ni avtomatik
                           berishi mumkin (hasMid=true → isChild=xato o'rnatilardi).

                       2️⃣  SPOUSE  — addedNode.pids[] da DB dagi mavjud odam ID si
                           bo'lsa. IKKINCHI tekshiriladi.
                           SABAB: pids — juftlikni ko'rsatuvchi yagona belgi.

                       3️⃣  CHILD   — addedNode.fid yoki mid → DB da mavjud shaxs.
                           OXIRGI. faqat parent ham spouse ham bo'lmasa.
                       ================================================================ */

                    // ── 1️⃣ PARENT tekshiruvi ──────────────────────────────────────
                    if (args.updateNodesData && args.updateNodesData.length > 0) {
                        for (var i = 0; i < args.updateNodesData.length; i++) {
                            var uNode = args.updateNodesData[i];
                            // addedNode.id — vaqtinchalik (temp) ID, == bilan taqqoslaymiz
                            if (String(uNode.fid) === String(addedNode.id) ||
                                String(uNode.mid) === String(addedNode.id)) {
                                isParent = true;
                                baseNodeId = uNode.id; // farzandning haqiqiy DB id si
                                break;
                            }
                        }
                    }

                    // ── 2️⃣ SPOUSE tekshiruvi ─────────────────────────────────────
                    if (!isParent && addedNode.pids && addedNode.pids.length > 0) {
                        for (var pi = 0; pi < addedNode.pids.length; pi++) {
                            if (_nodeTreeIdMap[addedNode.pids[pi]]) {
                                isSpouse = true;
                                baseNodeId = addedNode.pids[pi];
                                break;
                            }
                        }
                    }

                    // ── 3️⃣ CHILD tekshiruvi ──────────────────────────────────────
                    var hasFid = !isParent && !isSpouse &&
                        addedNode.fid && addedNode.fid != 0 && _nodeTreeIdMap[addedNode.fid];
                    var hasMid = !isParent && !isSpouse &&
                        addedNode.mid && addedNode.mid != 0 && _nodeTreeIdMap[addedNode.mid];

                    if (!isParent && !isSpouse && (hasFid || hasMid)) {
                        isChild = true;
                        baseNodeId = hasFid ? addedNode.fid : addedNode.mid;
                    }

                    console.log('[update ADD] → isParent:', isParent, '| isSpouse:', isSpouse,
                        '| isChild:', isChild, '| baseNodeId:', baseNodeId);

                    if (isParent && baseNodeId) {
                        addParent(baseNodeId);
                        return false;
                    } else if (isSpouse && baseNodeId) {
                        addSpouse(baseNodeId);
                        return false;
                    } else if (isChild && baseNodeId) {
                        // ✅ Gender: tags, gender field — barchasini tekshir
                        var tags = addedNode.tags || [];
                        var gField = (addedNode.gender || '').toLowerCase();
                        var isFemale = tags.indexOf('female') !== -1
                            || tags.indexOf('daughter') !== -1
                            || tags.indexOf('woman') !== -1
                            || gField === 'female' || gField === 'f';
                        var gender = isFemale ? 'FEMALE' : 'MALE';
                        console.log('[update ADD] child gender detected:', gender);

                        _pendingChildId = baseNodeId;
                        _pendingChildTreeId = _nodeTreeIdMap[baseNodeId] || Number(getTreeId());
                        // Juft nodeda: hasFid VA hasMid bo'lsa ikkinchi ota-onani saqlaymiz
                        _pendingChildSpouseId = (hasFid && hasMid) ? addedNode.mid : null;
                        confirmChild(gender);
                        return false;
                    }
                }

                /* ─── DELETE ─── */
                if (args.removeNodeId !== undefined && args.removeNodeId !== null) {
                    var delId = args.removeNodeId;

                    if (!confirm("Haqiqatan ham bu odamni o'chirmoqchimisiz?\nID: " + delId)) {
                        return false; // false → FamilyTree.js o'zgartirish qilmaydi
                    }

                    apiFetch('DELETE', '/api/persons/' + delId, null,
                        function () {
                            console.log('Person ' + delId + " o'chirildi");
                            reloadTree(null);
                        },
                        function (err) {
                            showError("O'chirishda xatolik:\n" + err);
                        }
                    );
                    return true; // true → FamilyTree.js lokal nodeni ham olib tashlaydi
                }

                /* ─── UPDATE ─── */
                var node = args.updateNodesData && args.updateNodesData[0];
                if (!node || !node.id) return true;

                var personId = node.id;
                var body = {
                    name: node.name || null,
                    birthDate: node.birthDate || null,
                    diedDate: node.diedDate || null,
                    photoUrl: node.photoUrl || null
                };

                apiFetch('PUT', '/api/persons/' + personId, body,
                    function () {
                        console.log('Person ' + personId + ' muvaffaqiyatli yangilandi!');
                    },
                    function (err) {
                        showError('Saqlashda xatolik:\n' + err);
                    }
                );

                return true;
            });
        }

        /* ────────────────────────────────────────────────────────────
           showRelatives(nodeId)
           O'sha shaxs uchun backend dan barcha qarindoshlarni oladi
           va hali ko'rinmagan nodelarni chart.addNodes() bilan qo'shadi.
           FamilyTree.js ga mos: reload qilmaydi, daraxt shu yerda o'sadi.
        ──────────────────────────────────────────────────────────── */
        function showRelatives(nodeId) {
            var token = getToken();
            if (!token) { showError('Token kiritilmagan'); return; }

            fetch('/api/layoutnew/person/' + nodeId, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    if (!data || !Array.isArray(data.nodes)) return;

                    var rawNodes = data.nodes || [];
                    var connections = data.connections || [];

                    /* ── gender xaritasi ── */
                    var genderMap = {};
                    rawNodes.forEach(function (n) {
                        genderMap[n.id] = (n.gender || 'MALE').toUpperCase();
                    });

                    /* ── fid / mid / pids xaritasi ── */
                    var fidMap = {}, midMap = {}, spouseMap = {};
                    connections.forEach(function (c) {
                        var t = (c.type || '').toUpperCase();
                        if (t === 'PARENT_CHILD') {
                            if (genderMap[c.fromId] === 'FEMALE') midMap[c.toId] = c.fromId;
                            else fidMap[c.toId] = c.fromId;
                        } else if (t === 'SPOUSE') {
                            if (!spouseMap[c.fromId]) spouseMap[c.fromId] = [];
                            if (!spouseMap[c.toId]) spouseMap[c.toId] = [];
                            if (spouseMap[c.fromId].indexOf(c.toId) < 0) spouseMap[c.fromId].push(c.toId);
                            if (spouseMap[c.toId].indexOf(c.fromId) < 0) spouseMap[c.toId].push(c.fromId);
                            // ── GLOBAL xaritaga ham qo'shamiz (merge) ──
                            var rFrom = String(c.fromId);
                            var rTo   = String(c.toId);
                            if (!_spouseMapGlobal[rFrom]) _spouseMapGlobal[rFrom] = [];
                            if (!_spouseMapGlobal[rTo])   _spouseMapGlobal[rTo]   = [];
                            if (_spouseMapGlobal[rFrom].indexOf(rTo) < 0) _spouseMapGlobal[rFrom].push(rTo);
                            if (_spouseMapGlobal[rTo].indexOf(rFrom) < 0) _spouseMapGlobal[rTo].push(rFrom);
                        }
                    });


                    var roleLbls = {
                        CENTER: '⭐ Asosiy', FATHER: '👨 Ota', MOTHER: '👩 Ona',
                        SPOUSE: '💑 Juft', CHILD: '👶 Farzand', SIBLING: '👫 Aka-uka'
                    };

                    // Barcha node id'larni saqlaymiz, faqat shular pids/fid ga kira oladi (stpid crash oldini olish uchun)
                    var allKnownIds = {};
                    Object.keys(_loadedFtNodes).forEach(function (i) { allKnownIds[i] = true; });
                    rawNodes.forEach(function (n) { allKnownIds[n.id] = true; });

                    /* ── Faqat YANGI nodelarni qo'shamiz va MA'LUMOTI yangilangan eski nodelarni yangilaymiz ── */
                    var newNodes = [];
                    var hasUpdates = false;

                    rawNodes.forEach(function (n) {
                        var rawPids = spouseMap[n.id] || [];
                        var safePids = rawPids.filter(function (pid) { return allKnownIds[pid]; });
                        var safeFid = (fidMap[n.id] !== undefined && allKnownIds[fidMap[n.id]]) ? fidMap[n.id] : null;
                        var safeMid = (midMap[n.id] !== undefined && allKnownIds[midMap[n.id]]) ? midMap[n.id] : null;

                        if (_loadedFtNodes[n.id]) {
                            // Eski node ni faqat qo'shimcha qarindoshlari topilganda yangilaymiz
                            var existing = _loadedFtNodes[n.id];
                            if (!existing.fid && safeFid) { existing.fid = safeFid; hasUpdates = true; }
                            if (!existing.mid && safeMid) { existing.mid = safeMid; hasUpdates = true; }
                            safePids.forEach(function (pid) {
                                if (existing.pids && existing.pids.indexOf(pid) === -1) {
                                    existing.pids.push(pid);
                                    hasUpdates = true;
                                }
                            });
                            return;
                        }

                        var years = '';
                        if (n.birthDate || n.diedDate) {
                            years = (n.birthDate ? getYear(n.birthDate) : '?')
                                + (n.diedDate ? ' – ' + getYear(n.diedDate) : '');
                        }
                        var newNode = {
                            id: n.id,
                            fid: safeFid,
                            mid: safeMid,
                            pids: safePids,
                            name: n.name || '—',
                            roleLabel: roleLbls[n.role] || (n.role || ''),
                            years: years,
                            birthDate: n.birthDate ? String(n.birthDate) : '',
                            diedDate: n.diedDate ? String(n.diedDate) : '',
                            photoUrl: n.photoUrl || null,
                            tags: [genderMap[n.id] === 'FEMALE' ? 'female' : 'male']
                        };
                        newNodes.push(newNode);
                        _loadedFtNodes[n.id] = newNode;
                        /* nodening treeId sini ham saqlaymiz */
                        if (n.treeId) _nodeTreeIdMap[n.id] = n.treeId;
                    });

                    if (newNodes.length > 0 || hasUpdates) {
                        /* Barcha (eski + yangi) nodelarni birga yuklash */
                        var allNodes = Object.values(_loadedFtNodes);

                        // ── MAJBURUIY XAVFSIZLIK (stpid crash) ──
                        allNodes.forEach(function (node) {
                            if (node.fid && node.mid) {
                                var f = allNodes.find(function (x) { return x.id === node.fid; });
                                var m = allNodes.find(function (x) { return x.id === node.mid; });
                                if (f && m) {
                                    if (!f.pids) f.pids = [];
                                    if (!m.pids) m.pids = [];
                                    if (f.pids.indexOf(m.id) === -1) f.pids.push(m.id);
                                    if (m.pids.indexOf(f.id) === -1) m.pids.push(f.id);
                                }
                            }
                        });

                        chart.load(allNodes);
                        console.log("[showRelatives] yangi/yangilangan node qo'shildi, jami: " + allNodes.length);
                    } else {
                        console.log("[showRelatives] Yangi node yo'q - hammasi allaqachon ko'rinmoqda");
                    }
                })
                .catch(function (e) {
                    showError('Qarindoshlarni yuklashda xatolik: ' + e.message);
                });
        }

        /* ────────────────────────────────────────────────────────────
           TREE YUKLASH
           GET /api/layoutnew/tree/{treeId}  yoki  /api/layoutnew/person/{id}
           Qaytaradi: TreeLayoutResponseDto { nodes[], connections[] }
        ──────────────────────────────────────────────────────────── */
        function loadTree(personId) {
            var token = getToken();
            var treeId = getTreeId();

            if (!token) { showError('Iltimos, Bearer tokenni kiriting!'); return; }
            if (!personId && !treeId) { showError('Iltimos, Tree ID ni kiriting!'); return; }

            showLoading(true);
            hideError();

            var url = personId
                ? '/api/layoutnew/person/' + personId
                : '/api/layoutnew/tree/' + treeId;

            apiFetch('GET', url, null,
                function (data) {
                    showLoading(false);
                    mapAndRender(data);   // ← MAPPER
                },
                function (err) {
                    showLoading(false);
                    showError('Yuklashda xatolik:\n' + err);
                }
            );
        }

        /* Amallar tugaganida treeId bo'yicha qayta yuklash */
        function reloadTree(personId) {
            if (chart) {
                try { chart.destroy(); } catch (e) {}
            }
            document.getElementById('tree').innerHTML = '';
            chart = null;
            _loadedFtNodes = {};
            initChart();
            loadTree(personId || null);
        }

        /* ────────────────────────────────────────────────────────────
           JS MAPPER:
           TreeLayoutResponseDto  →  FamilyTree.js nodes[]
        
           Backend DTO:
             nodes[]:  { id, name, gender, role, birthDate, diedDate, photoUrl, x, y }
             connections[]: { fromId, toId, type: 'PARENT_CHILD'|'SPOUSE' }
        
           FamilyTree.js format:
             { id, fid, mid, pids[], name, ... }
        ──────────────────────────────────────────────────────────── */
        function mapAndRender(dto) {
            /* dto = TreeLayoutResponseDto */
            var rawNodes = dto && Array.isArray(dto.nodes) ? dto.nodes : [];
            var connections = dto && Array.isArray(dto.connections) ? dto.connections : [];

            console.log('[mapAndRender] dto keldi:', dto);

            if (rawNodes.length === 0) {
                var debugInfo = JSON.stringify(dto).substring(0, 200);
                showError("Ma'lumot topilmadi yoki daraxt bo'sh.\nServer javobi: " + debugInfo);
                return;
            }

            /* ── 1. spouseMap (SPOUSE connections) va genderMap ── */
            var spouseMap = {};
            var genderMap = {};
            rawNodes.forEach(function (n) {
                genderMap[n.id] = (n.gender || 'MALE').toUpperCase();
            });

            // ── GLOBAL spouse xaritasini tozalaymiz (yangi load uchun) ──
            _spouseMapGlobal = {};

            connections.forEach(function (c) {
                var t = (c.type || '').toUpperCase();
                if (t === 'SPOUSE') {
                    // local spouseMap (numeric keys, used for FT node building)
                    if (!spouseMap[c.fromId]) spouseMap[c.fromId] = [];
                    if (!spouseMap[c.toId]) spouseMap[c.toId] = [];
                    if (spouseMap[c.fromId].indexOf(c.toId) < 0) spouseMap[c.fromId].push(c.toId);
                    if (spouseMap[c.toId].indexOf(c.fromId) < 0) spouseMap[c.toId].push(c.fromId);
                    // GLOBAL xarita: KEY va VALUE ikkalasi ham String — type mismatch oldini olamiz
                    var gFrom = String(c.fromId);
                    var gTo   = String(c.toId);
                    if (!_spouseMapGlobal[gFrom]) _spouseMapGlobal[gFrom] = [];
                    if (!_spouseMapGlobal[gTo])   _spouseMapGlobal[gTo]   = [];
                    if (_spouseMapGlobal[gFrom].indexOf(gTo) < 0) _spouseMapGlobal[gFrom].push(gTo);
                    if (_spouseMapGlobal[gTo].indexOf(gFrom) < 0) _spouseMapGlobal[gTo].push(gFrom);
                }
            });
            console.log('[mapAndRender] _spouseMapGlobal filled:', JSON.stringify(_spouseMapGlobal));

            /* ── 2. Role label ── */
            var roleLbls = {
                CENTER: '⭐ Asosiy',
                FATHER: '👨 Ota',
                MOTHER: '👩 Ona',
                SPOUSE: '💑 Juft',
                CHILD: '👶 Farzand',
                SIBLING: '👫 Aka-uka'
            };

            /* ── 3. FamilyTree.js nodes yasash ── */
            // fid/mid/pids faqat joriy layoutda mavjud node uchun
            // — aks holda FamilyTree.js 'stpid' crash beradi
            var layoutNodeIds = {};
            rawNodes.forEach(function (n) { layoutNodeIds[n.id] = true; });

            var ftNodes = rawNodes.map(function (n) {
                var rawPids = spouseMap[n.id] || [];
                // ✅ pids filtri: layoutda yo'q spouse chiqariladi
                var pids = rawPids.filter(function (pid) { return layoutNodeIds[pid]; });

                var years = '';
                if (n.birthDate || n.diedDate) {
                    years = (n.birthDate ? getYear(n.birthDate) : '?')
                        + (n.diedDate ? ' – ' + getYear(n.diedDate) : '');
                }

                return {
                    id: n.id,
                    // ✅ fid: layoutda yo'q ota bo'lsa null
                    fid: (n.fatherId && layoutNodeIds[n.fatherId]) ? n.fatherId : null,
                    // ✅ mid: layoutda yo'q ona bo'lsa null
                    mid: (n.motherId && layoutNodeIds[n.motherId]) ? n.motherId : null,
                    pids: pids,
                    name: n.name || '—',
                    roleLabel: roleLbls[n.role] || (n.role || ''),
                    years: years,
                    birthDate: n.birthDate ? String(n.birthDate) : '',
                    diedDate: n.diedDate ? String(n.diedDate) : '',
                    photoUrl: n.photoUrl || null,
                    tags: [genderMap[n.id] === 'FEMALE' ? 'female' : 'male'],
                    // Button fields mapping
                    alwaysShow: "1"
                };
            });

            // ── MAJBURUIY XAVFSIZLIK (stpid crash oldini olish) ──
            // Agar farzandning fid va mid si mavjud bo'lsa, FamilyTree.js ularni
            // avtomatik ravishda Spouse (juft) deb o'ylaydi. Agar ular pids da 
            // bo'lmasa, undefined 'stpid' crash yuz beradi. Shuni yopamiz:
            ftNodes.forEach(function (node) {
                if (node.fid && node.mid) {
                    var f = ftNodes.find(function (x) { return x.id === node.fid; });
                    var m = ftNodes.find(function (x) { return x.id === node.mid; });
                    if (f && m) {
                        if (f.pids.indexOf(m.id) === -1) f.pids.push(m.id);
                        if (m.pids.indexOf(f.id) === -1) m.pids.push(f.id);
                    }
                }
            });

            /* ── 4. FamilyTree.js ga yuklash ── */
            if (!chart) { showError('Chart initsializatsiya qilinmagan!'); return; }

            /* Yuklangan nodelarni saqlaymiz (merge uchun) */
            ftNodes.forEach(function (n) { _loadedFtNodes[n.id] = n; });
            /* Har bir nodening treeId sini saqlaymiz */
            rawNodes.forEach(function (n) { if (n.treeId) _nodeTreeIdMap[n.id] = n.treeId; });

            chart.load(ftNodes);

            /* Tanlangan odamni markazlashtirish (Ko'rsatish bosilganda) */
            if (window.lastPersonId) {
                setTimeout(function () {
                    chart.center(window.lastPersonId);
                    window.lastPersonId = null;  // saqlangan ID ni tozalash
                }, 400); // render tugashini kutish
            }

            /* ── 5. Statistika ── */
            document.getElementById('sTotal').textContent = ftNodes.length;
            document.getElementById('sSpouse').textContent =
                rawNodes.filter(function (n) { return n.role === 'SPOUSE'; }).length;
            document.getElementById('sChild').textContent =
                rawNodes.filter(function (n) { return n.role === 'CHILD'; }).length;
            document.getElementById('stats').style.display = 'flex';
        }

        /* ────────────────────────────────────────────────────────────
           API ACTIONS
           Har bir action tugaganida → reloadTree() (qayta yuklash)
        
           Backend DTO lari:
             add-parent:  PersonAddParentDto     { id, fatherId, motherId, treeId }
             add-spouse:  PersonAddSpouseCreate  { id, treeId }
             add-child:   PersonAddChildDto      { id, childGender, treeId }
        ──────────────────────────────────────────────────────────── */
        function addParent(nodeId) {
            var treeId = _nodeTreeIdMap[nodeId] || Number(getTreeId());
            if (!treeId) { showError('Tree ID topilmadi!'); return; }

            apiFetch('POST', '/api/persons/add-parent',
                { id: Number(nodeId), fatherId: null, motherId: null, treeId: treeId },
                function () {
                    /* Qayta yuklaymiz — bu nodeni markaz qilib */
                    _loadedFtNodes = {};
                    window.lastPersonId = nodeId;
                    reloadTree(null);
                },
                function (err) { showError("Ota-ona qo'shishda xatolik:\n" + err); }
            );
        }

        function addSpouse(nodeId) {
            var treeId = _nodeTreeIdMap[nodeId] || Number(getTreeId());
            if (!treeId) { showError('Tree ID topilmadi!'); return; }
            console.log('[addSpouse] nodeId:', nodeId, 'treeId:', treeId);

            apiFetch('POST', '/api/persons/add-spouse',
                { id: Number(nodeId), treeId: treeId },
                function (resp) {
                    console.log('[addSpouse] muvaffaqiyatli, javob:', resp);
                    _loadedFtNodes = {};
                    window.lastPersonId = nodeId;
                    reloadTree(null);
                },
                function (err) { showError("Juft qo'shishda xatolik:\n" + err); }
            );
        }

        function confirmChild(gender) {
            closeGender();
            if (!_pendingChildId) { showError('Node tanlanmagan!'); return; }

            var treeId = _nodeTreeIdMap[_pendingChildId] || _pendingChildTreeId;
            var centerId = _pendingChildId; // Markazlashtirish uchun saqlash
            if (!treeId) { showError('Tree ID topilmadi!'); return; }

            apiFetch('POST', '/api/persons/add-child',
                {
                    id: Number(_pendingChildId),
                    spouseId: _pendingChildSpouseId ? Number(_pendingChildSpouseId) : null,
                    childGender: gender,
                    treeId: treeId
                },
                function () {
                    _pendingChildId = null;
                    _pendingChildTreeId = null;
                    _pendingChildSpouseId = null;
                    _loadedFtNodes = {};
                    window.lastPersonId = centerId;
                    reloadTree(null);
                },
                function (err) { showError("Farzand qo'shishda xatolik:\n" + err); }
            );
        }

        function closeGender() {
            document.getElementById('genderPopup').classList.add('hidden');
        }

        /* ────────────────────────────────────────────────────────────
           UNIVERSAL FETCH HELPER
        ──────────────────────────────────────────────────────────── */
        function apiFetch(method, url, body, onOk, onErr) {
            var token = getToken();
            if (!token) { onErr('Token kiritilmagan!'); return; }

            showLoading(true);

            var opts = {
                method: method,
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            };
            if (body && (method === 'POST' || method === 'PUT')) {
                opts.body = JSON.stringify(body);
            }

            fetch(url, opts)
                .then(function (res) {
                    showLoading(false);

                    if (!res.ok) {
                        return res.text().then(function (t) {
                            /* JSON error message ni ajratib olish */
                            try {
                                var j = JSON.parse(t);
                                t = j.message || j.error || JSON.stringify(j);
                            } catch (e) { /* plain text */ }
                            onErr(res.status + ' ' + res.statusText + ':\n' + t);
                        });
                    }

                    if (res.status === 204) { onOk(null); return; }

                    var ct = res.headers.get('content-type') || '';
                    if (ct.indexOf('application/json') >= 0) {
                        return res.json().then(function (d) { onOk(d); });
                    }
                    return res.text().then(function () { onOk(null); });
                })
                .catch(function (e) {
                    showLoading(false);
                    onErr('Tarmoq xatosi: ' + (e.message || e));
                });
        }

        /* ────────────────────────────────────────────────────────────
           HELPERS
        ──────────────────────────────────────────────────────────── */
        function getYear(d) {
            if (!d) return '';
            if (Array.isArray(d)) return String(d[0]);
            if (typeof d === 'string') return d.substring(0, 4);
            return '';
        }

        function showLoading(v) {
            document.getElementById('loading').classList.toggle('hidden', !v);
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorModal').classList.add('show');
        }

        function hideError() {
            document.getElementById('errorModal').classList.remove('show');
        }

        function getToken() { return document.getElementById('tokenInput').value.trim(); }

        function getTreeId() {
            return document.getElementById('treeIdInput').value.trim()
                || getParam('treeId')
                || getParam('id')
                || '';
        }

        function getParam(k) {
            return new URLSearchParams(location.search).get(k);
        }
    </script>

</body>
