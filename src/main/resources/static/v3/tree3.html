<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shajara — To'liq Oila Daraxti (v3)</title>
    <meta name="description"
        content="Shajara v3 — Family Tree ID bo'yicha barcha oila a'zolarini ko'rsatuvchi interaktiv vizualizatsiya">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!--
        FamilyTree.js kutubxonasi — tree.html bilan YO'L BIR XIL,
        chunki /lib/ ildiz static papkasidan xizmat qiladi.
    -->
    <script src="/lib/familytree.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0b1e;
            --bg2: #13132e;
            --card: #1c1c42;
            --blue: #6366f1;
            --pink: #ec4899;
            --cyan: #22d3ee;
            --green: #10b981;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(99, 102, 241, .2);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ─── HEADER ─── */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(13, 13, 46, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--green), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .badge {
            font-size: 10px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--green), var(--cyan));
            color: #0b0b1e;
            padding: 2px 7px;
            border-radius: 20px;
            letter-spacing: .5px;
            white-space: nowrap;
        }

        .tree-name-divider {
            color: var(--border);
            font-size: 18px;
            font-weight: 300;
        }

        .tree-name-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--cyan);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        .header-inputs {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 600px;
        }

        .inp {
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 7px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: .2s;
        }

        .inp:focus {
            border-color: var(--green);
            background: rgba(16, 185, 129, .1);
        }

        .inp::placeholder {
            color: var(--muted);
        }

        #tokenInput {
            flex: 2;
        }

        #treeIdInput {
            flex: 1;
        }

        .btn {
            padding: 7px 18px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--green), var(--cyan));
            color: #0b0b1e;
        }

        .btn-primary:hover {
            opacity: .85;
            transform: translateY(-1px);
        }

        /* ─── TREE ─── */
        #tree {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ─── LOADING ─── */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 500;
            transition: opacity .4s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(16, 185, 129, .15);
            border-top-color: var(--green);
            animation: spin .75s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 14px;
            color: var(--muted);
        }

        /* ─── ERROR ─── */
        #errorModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            z-index: 600;
            max-width: 420px;
            width: 90%;
            display: none;
        }

        #errorModal.show {
            display: block;
        }

        .err-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .err-title {
            font-size: 16px;
            font-weight: 700;
            color: #f87171;
            margin-bottom: 8px;
        }

        #errorMsg {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            word-break: break-word;
        }

        .err-close {
            margin-top: 20px;
            padding: 8px 24px;
            border-radius: 10px;
            background: rgba(239, 68, 68, .2);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #f87171;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        /* ─── BACKGROUND ─── */
        .bg-dots {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(16, 185, 129, .04) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: .06;
            pointer-events: none;
            z-index: 0;
        }

        .glow1 {
            width: 500px;
            height: 500px;
            background: var(--green);
            top: -180px;
            left: -180px;
        }

        .glow2 {
            width: 500px;
            height: 500px;
            background: var(--cyan);
            bottom: -180px;
            right: -180px;
        }

        /* ─── FAMILYTREE.JS DARK OVERRIDES ─── */
        .bft-edit-form {
            font-family: 'Inter', sans-serif !important;
            background: rgba(19, 19, 46, .98) !important;
            border-left: 1px solid var(--border) !important;
        }

        .bft-edit-form-header {
            background: rgba(16, 185, 129, .2) !important;
        }

        /* ─── GENDER POPUP ─── */
        #genderPopup {
            position: fixed;
            inset: 0;
            z-index: 700;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #genderPopup.hidden {
            display: none;
        }

        .gender-box {
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, .3);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            min-width: 280px;
        }

        .gender-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .gender-btns {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .gbtn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            font-family: inherit;
        }

        .gbtn-m {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }

        .gbtn-m:hover {
            box-shadow: 0 4px 20px rgba(59, 130, 246, .5);
            transform: translateY(-2px);
        }

        .gbtn-f {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: #fff;
        }

        .gbtn-f:hover {
            box-shadow: 0 4px 20px rgba(249, 115, 22, .5);
            transform: translateY(-2px);
        }

        .gbtn-cancel {
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        /* ─── STATS ─── */
        #stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 150;
            background: rgba(19, 19, 46, .92);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            display: none;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-val {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--green), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        /* ─── INFO BANNER (v3 specific) ─── */
        .info-banner {
            position: fixed;
            top: 64px;
            right: 16px;
            z-index: 150;
            background: rgba(16, 185, 129, .12);
            border: 1px solid rgba(16, 185, 129, .3);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 11px;
            color: var(--green);
            font-weight: 600;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="bg-dots"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">🌳 Shajara</div>
        <span class="badge">v3 · To'liq daraxt</span>
        <span class="tree-name-divider">|</span>
        <span id="treeName" class="tree-name-label"></span>
        <div class="header-inputs">
            <input id="tokenInput" class="inp" type="password" placeholder="🔑 Bearer Token">
            <input id="treeIdInput" class="inp" type="number" placeholder="🆔 Tree ID">
        </div>
        <button id="loadBtn" class="btn btn-primary" onclick="loadFullTree()">Yuklash</button>
    </header>

    <!-- INFO BANNER -->
    <div class="info-banner">⚡ BARCHA oila a'zolari bir vaqtda yuklanadi</div>

    <!-- TREE CANVAS -->
    <div id="tree"></div>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Barcha oila a'zolari yuklanmoqda...</div>
    </div>

    <!-- ERROR -->
    <div id="errorModal">
        <div class="err-icon">⚠️</div>
        <div class="err-title">Xatolik yuz berdi</div>
        <div id="errorMsg">Noma'lum xatolik</div>
        <button class="err-close" onclick="hideError()">Yopish</button>
    </div>

    <!-- STATS -->
    <div id="stats">
        <div class="stat">
            <span class="stat-val" id="sTotal">0</span>
            <span class="stat-lbl">Jami</span>
        </div>
        <div class="stat">
            <span class="stat-val" id="sMale">0</span>
            <span class="stat-lbl">Erkak</span>
        </div>
        <div class="stat">
            <span class="stat-val" id="sFemale">0</span>
            <span class="stat-lbl">Ayol</span>
        </div>
        <div class="stat">
            <span class="stat-val" id="sSpouse">0</span>
            <span class="stat-lbl">Juftlar</span>
        </div>
    </div>

    <!-- GENDER POPUP -->
    <div id="genderPopup" class="hidden">
        <div class="gender-box">
            <div class="gender-title">👶 Farzand jinsi</div>
            <div class="gender-btns">
                <button class="gbtn gbtn-m" onclick="confirmChild('MALE')">👦 O'g'il</button>
                <button class="gbtn gbtn-f" onclick="confirmChild('FEMALE')">👧 Qiz</button>
                <button class="gbtn gbtn-cancel" onclick="closeGender()">✕ Bekor</button>
            </div>
        </div>
    </div>

    <!--
        app3.js — barcha mantiq shu faylda.
        /v3/app3.js yo'li bilan xizmat qilinadi.
    -->
    <script src="/v3/app3.js"></script>
</body>

</html>
