<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shajara - Oflayn D3.js</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CONTEXT MENU */
        #context-menu {
            position: fixed;
            z-index: 1000;
            display: none;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 0;
            min-width: 180px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-family: sans-serif;
            color: #f8fafc;
            font-size: 14px;
        }
        #context-menu.show {
            display: block;
        }
        .ctx-item {
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ctx-item:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        .ctx-divider {
            height: 1px;
            background: #334155;
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Shajara <span style="font-size: 14px; font-weight: normal; color: #94a3b8;">(D3.js)</span></h1>
            <div class="controls" style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                <input id="tokenInput" type="password" placeholder="🔑 Bearer Token" style="padding: 6px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit;">
                <input id="treeIdInput" type="number" placeholder="🆔 Tree ID" style="padding: 6px; border-radius: 6px; border: 1px solid #ccc; width: 90px; font-family: inherit;">
                <input id="personIdInput" type="number" placeholder="👤 Person ID" style="padding: 6px; border-radius: 6px; border: 1px solid #ccc; width: 100px; font-family: inherit;">
                <button id="btn-load-tree" style="padding: 6px 14px; border-radius: 6px; background: #3b82f6; color: white; border: none; cursor: pointer; font-weight: bold;">Yuklash</button>
                <div style="width: 1px; height: 24px; background: #ccc; margin: 0 4px;"></div>
                <button id="btn-zoom-in">Zoom +</button>
                <button id="btn-zoom-out">Zoom -</button>
                <button id="btn-center">Markazga</button>
            </div>
        </header>
        <div id="tree-container"></div>
    </div>
    
    <!-- CONTEXT MENU HTML -->
    <div id="context-menu">
        <!-- Add Actions -->
        <div class="ctx-group-add">
            <div class="ctx-item" onclick="handleAddAction('parent')">➕ Ota-ona qo'shish</div>
            <div class="ctx-item" onclick="handleAddAction('spouse')">💑 Juft qo'shish</div>
            <div class="ctx-item" onclick="handleAddAction('child_male')">👦 O'g'il qo'shish</div>
            <div class="ctx-item" onclick="handleAddAction('child_female')">👧 Qiz qo'shish</div>
        </div>
        
        <!-- Edit Actions -->
        <div class="ctx-group-edit" style="display: none;">
            <div class="ctx-item" onclick="handleEditAction('update')">✏️ Tahrirlash</div>
            <div class="ctx-divider"></div>
            <div class="ctx-item" style="color: #f87171;" onclick="handleEditAction('delete')">❌ O'chirish</div>
        </div>
    </div>

    <!-- Oflayn d3 kutubxonasi kafolatlangan ishlaydi -->
    <script src="d3.v7.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
