<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shajara — Oila Daraxti</title>
    <meta name="description" content="Shajara — interaktiv oila daraxti vizualizatsiyasi">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="/lib/familytree.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0b1e;
            --bg2: #13132e;
            --card: #1c1c42;
            --blue: #6366f1;
            --pink: #ec4899;
            --cyan: #22d3ee;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(99, 102, 241, .2);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(13, 13, 46, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .header-inputs {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 600px;
        }

        .inp {
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 7px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: .2s;
        }

        .inp:focus {
            border-color: var(--blue);
            background: rgba(99, 102, 241, .1);
        }

        .inp::placeholder {
            color: var(--muted);
        }

        #tokenInput {
            flex: 2;
        }

        #treeIdInput {
            flex: 1;
        }

        .btn {
            padding: 7px 18px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blue), var(--pink));
            color: #fff;
        }

        .btn-primary:hover {
            opacity: .85;
            transform: translateY(-1px);
        }

        /* TREE */
        #tree {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* LOADING */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 500;
            transition: opacity .4s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, .15);
            border-top-color: var(--blue);
            animation: spin .75s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 14px;
            color: var(--muted);
        }

        /* ERROR */
        #errorModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            z-index: 600;
            max-width: 420px;
            width: 90%;
            display: none;
        }

        #errorModal.show {
            display: block;
        }

        .err-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .err-title {
            font-size: 16px;
            font-weight: 700;
            color: #f87171;
            margin-bottom: 8px;
        }

        #errorMsg {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            word-break: break-word;
        }

        .err-close {
            margin-top: 20px;
            padding: 8px 24px;
            border-radius: 10px;
            background: rgba(239, 68, 68, .2);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #f87171;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        /* BACKGROUND */
        .bg-dots {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(99, 102, 241, .05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: .06;
            pointer-events: none;
            z-index: 0;
        }

        .glow1 {
            width: 500px;
            height: 500px;
            background: var(--blue);
            top: -180px;
            left: -180px;
        }

        .glow2 {
            width: 500px;
            height: 500px;
            background: var(--pink);
            bottom: -180px;
            right: -180px;
        }

        /* FAMILYTREE.JS dark overrides */
        .bft-edit-form {
            font-family: 'Inter', sans-serif !important;
            background: rgba(19, 19, 46, .98) !important;
            border-left: 1px solid var(--border) !important;
        }

        .bft-edit-form-header {
            background: rgba(99, 102, 241, .25) !important;
        }

        /* GENDER POPUP */
        #genderPopup {
            position: fixed;
            inset: 0;
            z-index: 700;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #genderPopup.hidden {
            display: none;
        }

        .gender-box {
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, .3);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            min-width: 280px;
        }

        .gender-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .gender-btns {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .gbtn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            font-family: inherit;
        }

        .gbtn-m {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }

        .gbtn-m:hover {
            box-shadow: 0 4px 20px rgba(59, 130, 246, .5);
            transform: translateY(-2px);
        }

        .gbtn-f {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: #fff;
        }

        .gbtn-f:hover {
            box-shadow: 0 4px 20px rgba(249, 115, 22, .5);
            transform: translateY(-2px);
        }

        .gbtn-cancel {
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        /* STATS */
        #stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 150;
            background: rgba(19, 19, 46, .92);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            display: none;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-val {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .4px;
        }
    </style>
</head>

<body>

    <div class="bg-dots"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">🌳 Shajara</div>
        <div class="header-inputs">
            <input id="tokenInput" class="inp" type="password" placeholder="🔑 Bearer Token">
            <input id="treeIdInput" class="inp" type="number" placeholder="🆔 Tree ID">
        </div>
        <button class="btn btn-primary" onclick="loadTree()">Yuklash</button>
    </header>

    <!-- TREE CANVAS -->
    <div id="tree"></div>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Yuklanyapti...</div>
    </div>

    <!-- ERROR -->
    <div id="errorModal">
        <div class="err-icon">⚠️</div>
        <div class="err-title">Xatolik yuz berdi</div>
        <div id="errorMsg">Noma'lum xatolik</div>
        <button class="err-close" onclick="hideError()">Yopish</button>
    </div>

    <!-- STATS -->
    <div id="stats">
        <div class="stat"><span class="stat-val" id="sTotal">0</span><span class="stat-lbl">Jami</span></div>
        <div class="stat"><span class="stat-val" id="sSpouse">0</span><span class="stat-lbl">Juftlar</span></div>
        <div class="stat"><span class="stat-val" id="sChild">0</span><span class="stat-lbl">Farzandlar</span></div>
    </div>

    <!-- GENDER POPUP -->
    <div id="genderPopup" class="hidden">
        <div class="gender-box">
            <div class="gender-title">👶 Farzand jinsi</div>
            <div class="gender-btns">
                <button class="gbtn gbtn-m" onclick="confirmChild('MALE')">👦 O'g'il</button>
                <button class="gbtn gbtn-f" onclick="confirmChild('FEMALE')">👧 Qiz</button>
                <button class="gbtn gbtn-cancel" onclick="closeGender()">✕ Bekor</button>
            </div>
        </div>
    </div>

    <script>
        /* ================================================================
           SHAJARA — tree.html JavaScript
           Yondashuv: O'rtada JS MAPPER
           - Backend DTOlari o'zgarmaydi
           - TreeLayoutResponseDto → FamilyTree.js format — JS da maplanadi
           - add-parent/spouse/child → to'g'ri DTO yuboriladi → reloadTree()
           ================================================================ */

        var chart = null;
        var _pendingChildId = null;
        var _pendingChildTreeId = null;
        var _pendingChildSpouseId = null; // faqat juft nodeda null emas
        /* Hozir chartda yuklangan barcha FamilyTree-format nodelar (id → node) */
        var _loadedFtNodes = {};
        /* Har bir nodening treeId si (id → treeId) */
        var _nodeTreeIdMap = {};

        /* ────────────────────────────────────────────────────────────
           INIT
        ──────────────────────────────────────────────────────────── */
        window.addEventListener('load', function () {
            showLoading(false);

            var urlToken = getParam('token');
            var urlTreeId = getParam('treeId') || getParam('id');
            if (urlToken) document.getElementById('tokenInput').value = urlToken;
            if (urlTreeId) document.getElementById('treeIdInput').value = urlTreeId;

            initChart();

            if (urlToken && urlTreeId) loadTree();
        });

        /* ────────────────────────────────────────────────────────────
           FAMILYTREE.JS INIT
        ──────────────────────────────────────────────────────────── */
        function initChart() {
            if (typeof FamilyTree === 'undefined') {
                showError('FamilyTree.js kutubxonasi yuklanmadi! /lib/familytree.js tekshiring.');
                return;
            }

            /* global handler — nodeMenu onclick uchun */
            window._showRelClick = function (e, nodeId) {
                e.stopPropagation();
                if (typeof showRelatives === 'function') showRelatives(nodeId);
            };

            chart = new FamilyTree(document.getElementById('tree'), {
                mode: 'dark',
                template: 'tommy',
                enableSearch: true,
                enablePan: true,
                mouseScrool: FamilyTree.action.zoom,

                nodeBinding: {
                    field_0: 'name',
                    field_1: 'roleLabel',
                    field_2: 'years',
                    img_0: 'photoUrl'
                },

                editForm: {
                    readOnly: false,
                    titleBinding: 'name',
                    photoBinding: 'photoUrl',
                    buttons: {
                        edit: { icon: FamilyTree.icon.edit(24, 24, '#fff'), text: 'Tahrirlash' },
                        details: { icon: FamilyTree.icon.details(24, 24, '#fff'), text: 'Batafsil' },
                        remove: { icon: FamilyTree.icon.remove(24, 24, '#fff'), text: "O'chirish" }
                    },
                    elements: [
                        { type: 'textbox', label: 'Ism', binding: 'name' },
                        { type: 'textbox', label: "Tug'ilgan", binding: 'birthDate' },
                        { type: 'textbox', label: 'Vafot', binding: 'diedDate' },
                        { type: 'textbox', label: 'Rasm URL', binding: 'photoUrl' }
                    ]
                },

                toolbar: { zoom: true, fit: true, fullScreen: true },

                nodeTreeMenu: true,

                /* ── Node o'ng-klik menyu ── */
                nodeMenu: {
                    showRelMenu: {
                        text: "📂 Ko'rsatish",
                        onClick: function (nodeId) {
                            _loadedFtNodes = {};   /* keshni tozalaymiz */
                            loadTree(nodeId);
                        }
                    },
                    addParentMenu: {
                        text: "🔼 Ota-ona qo'sh",
                        onClick: function (nodeId) { addParent(nodeId); }
                    },
                    addSpouseMenu: {
                        text: "💑 Juft qo'sh",
                        onClick: function (nodeId) { addSpouse(nodeId); }
                    },
                    addChildMenu: {
                        text: "🔽 Farzand qo'sh",
                        onClick: function (nodeId) {
                            _pendingChildId = nodeId;
                            _pendingChildSpouseId = null; // nodeMenu da doim yolg'iz
                            _pendingChildTreeId = _nodeTreeIdMap[nodeId] || Number(getTreeId());
                            document.getElementById('genderPopup').classList.remove('hidden');
                        }
                    },
                    details: { text: '📋 Batafsil' }
                },

                nodes: []
            });

            /* ── UPDATE va DELETE eventlari ──
               FamilyTree.js yangi API: chart.on('update', fn)
               fn argumentlari: (sender, args)
               args = { addNodesData:[], updateNodesData:[], removeNodeId: id|null }
            */
            chart.on('update', function (sender, args) {

                /* ─── ADD ─── */
                if (args.addNodesData && args.addNodesData.length > 0) {
                    var addedNode = args.addNodesData[0];
                    // ⚠️ JSON.stringify ishlatmang! FamilyTree ichki ob'yektlarida circular reference bor
                    console.log('[update ADD] node id:', addedNode.id,
                        '| fid:', addedNode.fid, '| mid:', addedNode.mid,
                        '| pids:', JSON.stringify(addedNode.pids));

                    var isParent = false, isChild = false, isSpouse = false;
                    var baseNodeId = null;

                    /* ================================================================
                       ANIQLASH TARTIBI (MUHIM — o'zgartirmang):
                       ─────────────────────────────────────────
                       1️⃣  PARENT  — updateNodesData da biror MAVJUD node ning
                           fid YOKI mid = addedNode.id bo'lsa.
                           Bu FamilyTree.js "add father/mother" placeholder uchun
                           ENG ISHONCHLI signal. BIRINCHI tekshiriladi.
                           SABAB: nodeTreeMenu da yangi ota placeholder yaratilganda
                           FamilyTree.js unga child ning mavjud motherId ni avtomatik
                           berishi mumkin (hasMid=true → isChild=xato o'rnatilardi).

                       2️⃣  SPOUSE  — addedNode.pids[] da DB dagi mavjud odam ID si
                           bo'lsa. IKKINCHI tekshiriladi.
                           SABAB: pids — juftlikni ko'rsatuvchi yagona belgi.

                       3️⃣  CHILD   — addedNode.fid yoki mid → DB da mavjud shaxs.
                           OXIRGI. faqat parent ham spouse ham bo'lmasa.
                       ================================================================ */

                    // ── 1️⃣ PARENT tekshiruvi ──────────────────────────────────────
                    if (args.updateNodesData && args.updateNodesData.length > 0) {
                        for (var i = 0; i < args.updateNodesData.length; i++) {
                            var uNode = args.updateNodesData[i];
                            // addedNode.id — vaqtinchalik (temp) ID, == bilan taqqoslaymiz
                            if (String(uNode.fid) === String(addedNode.id) ||
                                String(uNode.mid) === String(addedNode.id)) {
                                isParent = true;
                                baseNodeId = uNode.id; // farzandning haqiqiy DB id si
                                break;
                            }
                        }
                    }

                    // ── 2️⃣ SPOUSE tekshiruvi ─────────────────────────────────────
                    if (!isParent && addedNode.pids && addedNode.pids.length > 0) {
                        for (var pi = 0; pi < addedNode.pids.length; pi++) {
                            if (_nodeTreeIdMap[addedNode.pids[pi]]) {
                                isSpouse = true;
                                baseNodeId = addedNode.pids[pi];
                                break;
                            }
                        }
                    }

                    // ── 3️⃣ CHILD tekshiruvi ──────────────────────────────────────
                    var hasFid = !isParent && !isSpouse &&
                        addedNode.fid && addedNode.fid != 0 && _nodeTreeIdMap[addedNode.fid];
                    var hasMid = !isParent && !isSpouse &&
                        addedNode.mid && addedNode.mid != 0 && _nodeTreeIdMap[addedNode.mid];

                    if (!isParent && !isSpouse && (hasFid || hasMid)) {
                        isChild = true;
                        baseNodeId = hasFid ? addedNode.fid : addedNode.mid;
                    }

                    console.log('[update ADD] → isParent:', isParent, '| isSpouse:', isSpouse,
                        '| isChild:', isChild, '| baseNodeId:', baseNodeId);

                    if (isParent && baseNodeId) {
                        addParent(baseNodeId);
                        return false;
                    } else if (isSpouse && baseNodeId) {
                        addSpouse(baseNodeId);
                        return false;
                    } else if (isChild && baseNodeId) {
                        // ✅ Gender: tags, gender field — barchasini tekshir
                        var tags = addedNode.tags || [];
                        var gField = (addedNode.gender || '').toLowerCase();
                        var isFemale = tags.indexOf('female') !== -1
                            || tags.indexOf('daughter') !== -1
                            || tags.indexOf('woman') !== -1
                            || gField === 'female' || gField === 'f';
                        var gender = isFemale ? 'FEMALE' : 'MALE';
                        console.log('[update ADD] child gender detected:', gender);

                        _pendingChildId = baseNodeId;
                        _pendingChildTreeId = _nodeTreeIdMap[baseNodeId] || Number(getTreeId());
                        // Juft nodeda: hasFid VA hasMid bo'lsa ikkinchi ota-onani saqlaymiz
                        _pendingChildSpouseId = (hasFid && hasMid) ? addedNode.mid : null;
                        confirmChild(gender);
                        return false;
                    }
                }

                /* ─── DELETE ─── */
                if (args.removeNodeId !== undefined && args.removeNodeId !== null) {
                    var delId = args.removeNodeId;

                    if (!confirm("Haqiqatan ham bu odamni o'chirmoqchimisiz?\nID: " + delId)) {
                        return false; // false → FamilyTree.js o'zgartirish qilmaydi
                    }

                    apiFetch('DELETE', '/api/persons/' + delId, null,
                        function () {
                            console.log('Person ' + delId + " o'chirildi");
                            reloadTree();
                        },
                        function (err) {
                            showError("O'chirishda xatolik:\n" + err);
                        }
                    );
                    return true; // true → FamilyTree.js lokal nodeni ham olib tashlaydi
                }

                /* ─── UPDATE ─── */
                var node = args.updateNodesData && args.updateNodesData[0];
                if (!node || !node.id) return true;

                var personId = node.id;
                var body = {
                    name: node.name || null,
                    birthDate: node.birthDate || null,
                    diedDate: node.diedDate || null,
                    photoUrl: node.photoUrl || null
                };

                apiFetch('PUT', '/api/persons/' + personId, body,
                    function () {
                        console.log('Person ' + personId + ' muvaffaqiyatli yangilandi!');
                    },
                    function (err) {
                        showError('Saqlashda xatolik:\n' + err);
                    }
                );

                return true;
            });
        }

        /* ────────────────────────────────────────────────────────────
           showRelatives(nodeId)
           O'sha shaxs uchun backend dan barcha qarindoshlarni oladi
           va hali ko'rinmagan nodelarni chart.addNodes() bilan qo'shadi.
           FamilyTree.js ga mos: reload qilmaydi, daraxt shu yerda o'sadi.
        ──────────────────────────────────────────────────────────── */
        function showRelatives(nodeId) {
            var token = getToken();
            if (!token) { showError('Token kiritilmagan'); return; }

            fetch('/api/layout/person/' + nodeId, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    if (!data || !Array.isArray(data.nodes)) return;

                    var rawNodes = data.nodes || [];
                    var connections = data.connections || [];

                    /* ── gender xaritasi ── */
                    var genderMap = {};
                    rawNodes.forEach(function (n) {
                        genderMap[n.id] = (n.gender || 'MALE').toUpperCase();
                    });

                    /* ── fid / mid / pids xaritasi ── */
                    var fidMap = {}, midMap = {}, spouseMap = {};
                    connections.forEach(function (c) {
                        var t = (c.type || '').toUpperCase();
                        if (t === 'PARENT_CHILD') {
                            if (genderMap[c.fromId] === 'FEMALE') midMap[c.toId] = c.fromId;
                            else fidMap[c.toId] = c.fromId;
                        } else if (t === 'SPOUSE') {
                            if (!spouseMap[c.fromId]) spouseMap[c.fromId] = [];
                            if (!spouseMap[c.toId]) spouseMap[c.toId] = [];
                            if (spouseMap[c.fromId].indexOf(c.toId) < 0) spouseMap[c.fromId].push(c.toId);
                            if (spouseMap[c.toId].indexOf(c.fromId) < 0) spouseMap[c.toId].push(c.fromId);
                        }
                    });

                    var roleLbls = {
                        CENTER: '⭐ Asosiy', FATHER: '👨 Ota', MOTHER: '👩 Ona',
                        SPOUSE: '💑 Juft', CHILD: '👶 Farzand', SIBLING: '👫 Aka-uka'
                    };

                    /* ── Faqat YANGI nodelarni qo'shamiz ── */
                    var newNodes = [];
                    rawNodes.forEach(function (n) {
                        if (_loadedFtNodes[n.id]) return;

                        var years = '';
                        if (n.birthDate || n.diedDate) {
                            years = (n.birthDate ? getYear(n.birthDate) : '?')
                                + (n.diedDate ? ' – ' + getYear(n.diedDate) : '');
                        }
                        var newNode = {
                            id: n.id,
                            fid: fidMap[n.id] !== undefined ? fidMap[n.id] : null,
                            mid: midMap[n.id] !== undefined ? midMap[n.id] : null,
                            pids: spouseMap[n.id] || [],
                            name: n.name || '—',
                            roleLabel: roleLbls[n.role] || (n.role || ''),
                            years: years,
                            birthDate: n.birthDate ? String(n.birthDate) : '',
                            diedDate: n.diedDate ? String(n.diedDate) : '',
                            photoUrl: n.photoUrl || null,
                            tags: [genderMap[n.id] === 'FEMALE' ? 'female' : 'male']
                        };
                        newNodes.push(newNode);
                        _loadedFtNodes[n.id] = newNode;
                        /* nodening treeId sini ham saqlaymiz */
                        if (n.treeId) _nodeTreeIdMap[n.id] = n.treeId;
                    });

                    if (newNodes.length > 0) {
                        /* Barcha (eski + yangi) nodelarni birga yuklash */
                        var allNodes = Object.values(_loadedFtNodes);
                        chart.load(allNodes);
                        console.log('[showRelatives] ' + newNodes.length + ' yangi node qo\'shildi, jami: ' + allNodes.length);
                    } else {
                        console.log('[showRelatives] Yangi node yo\'q — hammasi allaqachon ko\'rinmoqda');
                    }
                })
                .catch(function (e) {
                    showError('Qarindoshlarni yuklashda xatolik: ' + e.message);
                });
        }

        /* ────────────────────────────────────────────────────────────
           TREE YUKLASH
           GET /api/layout/tree/{treeId}  yoki  /api/layout/person/{id}
           Qaytaradi: TreeLayoutResponseDto { nodes[], connections[] }
        ──────────────────────────────────────────────────────────── */
        function loadTree(personId) {
            var token = getToken();
            var treeId = getTreeId();

            if (!token) { showError('Iltimos, Bearer tokenni kiriting!'); return; }
            if (!personId && !treeId) { showError('Iltimos, Tree ID ni kiriting!'); return; }

            showLoading(true);
            hideError();

            var url = personId
                ? '/api/layout/person/' + personId
                : '/api/layout/tree/' + treeId;

            apiFetch('GET', url, null,
                function (data) {
                    showLoading(false);
                    mapAndRender(data);   // ← MAPPER
                },
                function (err) {
                    showLoading(false);
                    showError('Yuklashda xatolik:\n' + err);
                }
            );
        }

        /* Amallar tugaganida treeId bo'yicha qayta yuklash */
        function reloadTree() {
            loadTree(null);
        }

        /* ────────────────────────────────────────────────────────────
           JS MAPPER:
           TreeLayoutResponseDto  →  FamilyTree.js nodes[]
        
           Backend DTO:
             nodes[]:  { id, name, gender, role, birthDate, diedDate, photoUrl, x, y }
             connections[]: { fromId, toId, type: 'PARENT_CHILD'|'SPOUSE' }
        
           FamilyTree.js format:
             { id, fid, mid, pids[], name, ... }
        ──────────────────────────────────────────────────────────── */
        function mapAndRender(dto) {
            /* dto = TreeLayoutResponseDto */
            var rawNodes = dto && Array.isArray(dto.nodes) ? dto.nodes : [];
            var connections = dto && Array.isArray(dto.connections) ? dto.connections : [];

            console.log('[mapAndRender] dto keldi:', dto);

            if (rawNodes.length === 0) {
                var debugInfo = JSON.stringify(dto).substring(0, 200);
                showError("Ma'lumot topilmadi yoki daraxt bo'sh.\nServer javobi: " + debugInfo);
                return;
            }

            /* ── 1. spouseMap (SPOUSE connections) va genderMap ── */
            var spouseMap = {};
            var genderMap = {};
            rawNodes.forEach(function (n) {
                genderMap[n.id] = (n.gender || 'MALE').toUpperCase();
            });

            connections.forEach(function (c) {
                var t = (c.type || '').toUpperCase();
                if (t === 'SPOUSE') {
                    if (!spouseMap[c.fromId]) spouseMap[c.fromId] = [];
                    if (!spouseMap[c.toId]) spouseMap[c.toId] = [];
                    if (spouseMap[c.fromId].indexOf(c.toId) < 0) spouseMap[c.fromId].push(c.toId);
                    if (spouseMap[c.toId].indexOf(c.fromId) < 0) spouseMap[c.toId].push(c.fromId);
                }
            });

            /* ── 2. Role label ── */
            var roleLbls = {
                CENTER: '⭐ Asosiy',
                FATHER: '👨 Ota',
                MOTHER: '👩 Ona',
                SPOUSE: '💑 Juft',
                CHILD: '👶 Farzand',
                SIBLING: '👫 Aka-uka'
            };

            /* ── 3. FamilyTree.js nodes yasash ── */
            // fid/mid/pids faqat joriy layoutda mavjud node uchun
            // — aks holda FamilyTree.js 'stpid' crash beradi
            var layoutNodeIds = {};
            rawNodes.forEach(function (n) { layoutNodeIds[n.id] = true; });

            var ftNodes = rawNodes.map(function (n) {
                var rawPids = spouseMap[n.id] || [];
                // ✅ pids filtri: layoutda yo'q spouse chiqariladi
                var pids = rawPids.filter(function (pid) { return layoutNodeIds[pid]; });

                var years = '';
                if (n.birthDate || n.diedDate) {
                    years = (n.birthDate ? getYear(n.birthDate) : '?')
                        + (n.diedDate ? ' – ' + getYear(n.diedDate) : '');
                }

                return {
                    id: n.id,
                    // ✅ fid: layoutda yo'q ota bo'lsa null
                    fid: (n.fatherId && layoutNodeIds[n.fatherId]) ? n.fatherId : null,
                    // ✅ mid: layoutda yo'q ona bo'lsa null
                    mid: (n.motherId && layoutNodeIds[n.motherId]) ? n.motherId : null,
                    pids: pids,
                    name: n.name || '—',
                    roleLabel: roleLbls[n.role] || (n.role || ''),
                    years: years,
                    birthDate: n.birthDate ? String(n.birthDate) : '',
                    diedDate: n.diedDate ? String(n.diedDate) : '',
                    photoUrl: n.photoUrl || null,
                    tags: [genderMap[n.id] === 'FEMALE' ? 'female' : 'male']
                };
            });

            /* ── 4. FamilyTree.js ga yuklash ── */
            if (!chart) { showError('Chart initsializatsiya qilinmagan!'); return; }

            /* Yuklangan nodelarni saqlaymiz (merge uchun) */
            ftNodes.forEach(function (n) { _loadedFtNodes[n.id] = n; });
            /* Har bir nodening treeId sini saqlaymiz */
            rawNodes.forEach(function (n) { if (n.treeId) _nodeTreeIdMap[n.id] = n.treeId; });

            chart.load(ftNodes);

            /* ── 5. Statistika ── */
            document.getElementById('sTotal').textContent = ftNodes.length;
            document.getElementById('sSpouse').textContent =
                rawNodes.filter(function (n) { return n.role === 'SPOUSE'; }).length;
            document.getElementById('sChild').textContent =
                rawNodes.filter(function (n) { return n.role === 'CHILD'; }).length;
            document.getElementById('stats').style.display = 'flex';
        }

        /* ────────────────────────────────────────────────────────────
           API ACTIONS
           Har bir action tugaganida → reloadTree() (qayta yuklash)
        
           Backend DTO lari:
             add-parent:  PersonAddParentDto     { id, fatherId, motherId, treeId }
             add-spouse:  PersonAddSpouseCreate  { id, treeId }
             add-child:   PersonAddChildDto      { id, childGender, treeId }
        ──────────────────────────────────────────────────────────── */
        function addParent(nodeId) {
            var treeId = _nodeTreeIdMap[nodeId] || Number(getTreeId());
            if (!treeId) { showError('Tree ID topilmadi!'); return; }

            apiFetch('POST', '/api/persons/add-parent',
                { id: Number(nodeId), fatherId: null, motherId: null, treeId: treeId },
                function () {
                    /* Qayta yuklaymiz — bu nodeni markaz qilib */
                    _loadedFtNodes = {};
                    reloadTree();
                },
                function (err) { showError("Ota-ona qo'shishda xatolik:\n" + err); }
            );
        }

        function addSpouse(nodeId) {
            var treeId = _nodeTreeIdMap[nodeId] || Number(getTreeId());
            if (!treeId) { showError('Tree ID topilmadi!'); return; }
            console.log('[addSpouse] nodeId:', nodeId, 'treeId:', treeId);

            apiFetch('POST', '/api/persons/add-spouse',
                { id: Number(nodeId), treeId: treeId },
                function (resp) {
                    console.log('[addSpouse] muvaffaqiyatli, javob:', resp);
                    _loadedFtNodes = {};
                    // ✅ Spouse qo'shilgandan keyin CENTER (nodeId) bo'yicha reload
                    loadTree(Number(nodeId));
                },
                function (err) { showError("Juft qo'shishda xatolik:\n" + err); }
            );
        }

        function confirmChild(gender) {
            closeGender();
            if (!_pendingChildId) { showError('Node tanlanmagan!'); return; }

            var treeId = _nodeTreeIdMap[_pendingChildId] || _pendingChildTreeId;
            if (!treeId) { showError('Tree ID topilmadi!'); return; }

            apiFetch('POST', '/api/persons/add-child',
                {
                    id: Number(_pendingChildId),
                    spouseId: _pendingChildSpouseId ? Number(_pendingChildSpouseId) : null,
                    childGender: gender,
                    treeId: treeId
                },
                function () {
                    _pendingChildId = null;
                    _pendingChildTreeId = null;
                    _pendingChildSpouseId = null;
                    _loadedFtNodes = {};
                    reloadTree();
                },
                function (err) { showError("Farzand qo'shishda xatolik:\n" + err); }
            );
        }

        function closeGender() {
            document.getElementById('genderPopup').classList.add('hidden');
        }

        /* ────────────────────────────────────────────────────────────
           UNIVERSAL FETCH HELPER
        ──────────────────────────────────────────────────────────── */
        function apiFetch(method, url, body, onOk, onErr) {
            var token = getToken();
            if (!token) { onErr('Token kiritilmagan!'); return; }

            showLoading(true);

            var opts = {
                method: method,
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            };
            if (body && (method === 'POST' || method === 'PUT')) {
                opts.body = JSON.stringify(body);
            }

            fetch(url, opts)
                .then(function (res) {
                    showLoading(false);

                    if (!res.ok) {
                        return res.text().then(function (t) {
                            /* JSON error message ni ajratib olish */
                            try {
                                var j = JSON.parse(t);
                                t = j.message || j.error || JSON.stringify(j);
                            } catch (e) { /* plain text */ }
                            onErr(res.status + ' ' + res.statusText + ':\n' + t);
                        });
                    }

                    if (res.status === 204) { onOk(null); return; }

                    var ct = res.headers.get('content-type') || '';
                    if (ct.indexOf('application/json') >= 0) {
                        return res.json().then(function (d) { onOk(d); });
                    }
                    return res.text().then(function () { onOk(null); });
                })
                .catch(function (e) {
                    showLoading(false);
                    onErr('Tarmoq xatosi: ' + (e.message || e));
                });
        }

        /* ────────────────────────────────────────────────────────────
           HELPERS
        ──────────────────────────────────────────────────────────── */
        function getYear(d) {
            if (!d) return '';
            if (Array.isArray(d)) return String(d[0]);
            if (typeof d === 'string') return d.substring(0, 4);
            return '';
        }

        function showLoading(v) {
            document.getElementById('loading').classList.toggle('hidden', !v);
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorModal').classList.add('show');
        }

        function hideError() {
            document.getElementById('errorModal').classList.remove('show');
        }

        function getToken() { return document.getElementById('tokenInput').value.trim(); }

        function getTreeId() {
            return document.getElementById('treeIdInput').value.trim()
                || getParam('treeId')
                || getParam('id')
                || '';
        }

        function getParam(k) {
            return new URLSearchParams(location.search).get(k);
        }
    </script>

</body>
