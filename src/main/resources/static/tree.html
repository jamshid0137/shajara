<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shajara — Oila Daraxti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b1e;
            --bg2: #13132e;
            --card: #1c1c42;
            --border: rgba(99, 102, 241, 0.18);
            --blue: #6366f1;
            --cyan: #22d3ee;
            --pink: #ec4899;
            --green: #10b981;
            --orange: #f97316;
            --amber: #f59e0b;
            --text: #f1f5f9;
            --muted: #64748b;
            --NODE_W: 200px;
            --NODE_H: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: rgba(11, 11, 30, 0.96);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .header input {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 7px 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: .25s;
        }

        .header input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
        }

        #tokenInput {
            width: 260px;
        }

        #personIdInput {
            width: 130px;
        }

        .btn {
            padding: 7px 16px;
            border-radius: 10px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(99, 102, 241, .5);
            transform: translateY(-1px);
        }

        .btn-green {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
        }

        .btn-green:hover {
            box-shadow: 0 4px 20px rgba(16, 185, 129, .4);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            color: var(--text);
        }

        .btn-ghost:hover {
            background: rgba(99, 102, 241, .15);
            border-color: rgba(99, 102, 241, .3);
        }

        /* ── LEGEND ── */
        .legend {
            position: fixed;
            top: 62px;
            right: 16px;
            z-index: 150;
            background: rgba(19, 19, 46, .92);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .legend-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 2px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* ── CANVAS ── */
        .canvas-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }

        .canvas-wrap:active {
            cursor: grabbing;
        }

        .viewport {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        /* ── SVG CONNECTIONS ── */
        .svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: visible;
        }

        .conn {
            fill: none;
            stroke-width: 2;
            opacity: .65;
        }

        .conn-spouse {
            stroke: var(--pink);
            stroke-dasharray: 8, 4;
            animation: dash 14s linear infinite;
        }

        .conn-parent {
            stroke: url(#cg);
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -120;
            }
        }

        /* ── NODE ── */
        .node {
            position: absolute;
            width: 200px;
            height: 80px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            transition: transform .3s cubic-bezier(.34, 1.56, .64, 1), box-shadow .3s;
            opacity: 0;
            animation: appear .5s ease-out forwards;
            user-select: none;
        }

        .node:hover {
            transform: scale(1.07) !important;
            z-index: 80;
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: scale(.6) translateY(12px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* avatarka */
        .avatar {
            width: 46px;
            height: 46px;
            min-width: 46px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .node-info {
            overflow: hidden;
        }

        .node-name {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-role {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .5px;
            opacity: .75;
            color: rgba(255, 255, 255, .85);
            margin-top: 2px;
        }

        .node-date {
            font-size: 10px;
            opacity: .55;
            color: #fff;
            margin-top: 1px;
        }

        /* ── NODE COLORS ── */
        .role-CENTER {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            box-shadow: 0 4px 28px rgba(99, 102, 241, .5), 0 0 60px rgba(99, 102, 241, .12);
            border: 2px solid rgba(139, 92, 246, .5);
            width: 210px !important;
            height: 88px !important;
        }

        .role-CENTER .avatar {
            width: 52px;
            height: 52px;
            min-width: 52px;
        }

        .role-FATHER {
            background: linear-gradient(135deg, #059669, #10b981);
            box-shadow: 0 4px 20px rgba(16, 185, 129, .35);
            border: 1.5px solid rgba(5, 150, 105, .4);
        }

        .role-MOTHER {
            background: linear-gradient(135deg, #0891b2, #22d3ee);
            box-shadow: 0 4px 20px rgba(34, 211, 238, .35);
            border: 1.5px solid rgba(8, 145, 178, .4);
        }

        .role-SPOUSE {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            box-shadow: 0 4px 20px rgba(236, 72, 153, .35);
            border: 1.5px solid rgba(244, 63, 94, .4);
        }

        .role-CHILD.gender-MALE {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            box-shadow: 0 4px 18px rgba(59, 130, 246, .3);
            border: 1.5px solid rgba(99, 102, 241, .3);
        }

        .role-CHILD.gender-FEMALE {
            background: linear-gradient(135deg, #f97316, #ec4899);
            box-shadow: 0 4px 18px rgba(249, 115, 22, .3);
            border: 1.5px solid rgba(236, 72, 153, .3);
        }

        .role-SIBLING {
            background: linear-gradient(135deg, #d97706, #f59e0b);
            box-shadow: 0 4px 18px rgba(245, 158, 11, .35);
            border: 1.5px solid rgba(217, 119, 6, .4);
        }

        /* ── ZOOM CONTROLS ── */
        .zoom-ctrl {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 150;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }

        .zbtn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(28, 28, 66, .9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
        }

        .zbtn:hover {
            background: rgba(99, 102, 241, .25);
            border-color: var(--blue);
            transform: scale(1.1);
        }

        .zlabel {
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
        }

        /* ── STATS ── */
        .stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 150;
            background: rgba(19, 19, 46, .92);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            display: none;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-val {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        /* ── LOADING ── */
        .loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 500;
            transition: opacity .4s;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, .15);
            border-top-color: var(--blue);
            animation: spin .75s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 14px;
            color: var(--muted);
        }

        /* ── ERROR ── */
        .error-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            z-index: 600;
            max-width: 380px;
            display: none;
        }

        .error-modal.show {
            display: block;
            animation: appear .3s;
        }

        .error-icon {
            font-size: 44px;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 17px;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 8px;
        }

        .error-msg {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.6;
        }

        /* ── BG ── */
        .bg-dots {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(99, 102, 241, .05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: .07;
            pointer-events: none;
            z-index: 0;
        }

        .glow1 {
            width: 500px;
            height: 500px;
            background: var(--blue);
            top: -180px;
            left: -180px;
        }

        .glow2 {
            width: 500px;
            height: 500px;
            background: var(--pink);
            bottom: -180px;
            right: -180px;
        }

        /* ── TOOLTIP ── */
        .tooltip {
            position: fixed;
            z-index: 300;
            background: rgba(19, 19, 46, .97);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(99, 102, 241, .22);
            border-radius: 12px;
            padding: 12px 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity .18s;
            max-width: 240px;
        }

        .tooltip.show {
            opacity: 1;
        }

        .tt-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tt-info {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.55;
        }

        /* ── ACTION BUTTONS ── */
        .node {
            overflow: visible !important;
        }

        .node:hover .action-btn {
            opacity: 1;
            pointer-events: all;
        }

        .action-btn {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s, transform .2s, box-shadow .2s;
            z-index: 200;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .5);
        }

        .action-btn.top {
            background: linear-gradient(135deg, #10b981, #059669);
            top: -13px;
            left: 50%;
            transform: translateX(-50%);
        }

        .action-btn.left {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            left: -13px;
            top: 50%;
            transform: translateY(-50%);
        }

        .action-btn.right {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            right: -13px;
            top: 50%;
            transform: translateY(-50%);
        }

        .action-btn.bottom {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            bottom: -13px;
            left: 50%;
            transform: translateX(-50%);
        }

        .action-btn.top:hover {
            transform: translateX(-50%) scale(1.2);
            box-shadow: 0 4px 14px rgba(16, 185, 129, .7);
        }

        .action-btn.left:hover {
            transform: translateY(-50%) scale(1.2);
            box-shadow: 0 4px 14px rgba(236, 72, 153, .7);
        }

        .action-btn.right:hover {
            transform: translateY(-50%) scale(1.2);
            box-shadow: 0 4px 14px rgba(236, 72, 153, .7);
        }

        .action-btn.bottom:hover {
            transform: translateX(-50%) scale(1.2);
            box-shadow: 0 4px 14px rgba(59, 130, 246, .7);
        }

        /* ── GENDER POPUP ── */
        .gender-popup {
            position: fixed;
            inset: 0;
            z-index: 700;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gender-popup.hidden {
            display: none;
        }

        .gender-box {
            background: rgba(19, 19, 46, .98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, .3);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            min-width: 280px;
        }

        .gender-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .gender-btns {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .gbtn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
        }

        .gbtn-m {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }

        .gbtn-m:hover {
            box-shadow: 0 4px 20px rgba(59, 130, 246, .5);
            transform: translateY(-2px);
        }

        .gbtn-f {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: #fff;
        }

        .gbtn-f:hover {
            box-shadow: 0 4px 20px rgba(236, 72, 153, .5);
            transform: translateY(-2px);
        }

        .gbtn-cancel {
            background: rgba(255, 255, 255, .08);
            color: #94a3b8;
        }

        /* ── DETAIL PANEL ── */
        .detail-panel {
            position: fixed;
            top: 60px;
            right: -420px;
            width: 380px;
            height: calc(100vh - 70px);
            background: rgba(13, 13, 35, 0.97);
            backdrop-filter: blur(24px);
            border-left: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 20px 0 0 20px;
            z-index: 400;
            transition: right 0.35s cubic-bezier(.4, 0, .2, 1);
            overflow-y: auto;
            padding: 24px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .detail-panel.open {
            right: 0;
        }

        .dp-close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #94a3b8;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
        }

        .dp-close:hover {
            background: rgba(239, 68, 68, .2);
            color: #ef4444;
        }

        .dp-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            margin: 0 auto 4px;
            border: 3px solid rgba(99, 102, 241, .5);
            background: rgba(99, 102, 241, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
            color: #a5b4fc;
            overflow: hidden;
        }

        .dp-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dp-name {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: #f1f5f9;
        }

        .dp-role {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: #6366f1;
            margin-top: -8px;
        }

        .dp-divider {
            border: none;
            border-top: 1px solid rgba(99, 102, 241, .12);
        }

        .dp-section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .7px;
            color: #475569;
            margin-bottom: 6px;
        }

        .dp-field {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, .03);
            border-radius: 10px;
            font-size: 13px;
        }

        .dp-field-icon {
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .dp-field-label {
            font-size: 10px;
            color: #64748b;
            margin-bottom: 1px;
        }

        .dp-field-val {
            color: #e2e8f0;
            font-weight: 500;
        }

        .dp-person-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            background: rgba(99, 102, 241, .08);
            border: 1px solid rgba(99, 102, 241, .15);
            border-radius: 10px;
            font-size: 12px;
            color: #c7d2fe;
            cursor: pointer;
            transition: .2s;
        }

        .dp-person-chip:hover {
            background: rgba(99, 102, 241, .18);
            border-color: rgba(99, 102, 241, .35);
        }

        .dp-chip-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(99, 102, 241, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #a5b4fc;
            flex-shrink: 0;
            overflow: hidden;
        }

        .dp-chip-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dp-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .dp-loading-mini {
            text-align: center;
            color: #475569;
            font-size: 13px;
            padding: 20px 0;
        }
    </style>
</head>

<body>

    <!-- BG -->
    <div class="bg-dots"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- DETAIL PANEL -->
    <div class="detail-panel" id="detailPanel">
        <button class="dp-close" onclick="closeDetailPanel()">✕</button>
        <div id="dpContent">
            <div class="dp-loading-mini">Yuklanmoqda...</div>
        </div>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Shajara yuklanmoqda...</div>
    </div>

    <!-- ERROR -->
    <div class="error-modal" id="errorModal">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Xatolik yuz berdi</div>
        <div class="error-msg" id="errorMsg"></div>
        <br>
        <button class="btn btn-primary" onclick="location.reload()">Qayta urinish</button>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">🌿 Shajara</div>
        <input type="text" id="tokenInput" placeholder="Bearer token kiriting...">
        <input type="number" id="treeIdInput" placeholder="Tree ID" min="1">
        <button class="btn btn-primary" onclick="loadTree()">📊 Yuklash</button>
        <button class="btn btn-ghost" onclick="resetView()">🎯 Markazlash</button>
        <button class="btn btn-ghost" onclick="fitAll()">📐 Moslashtirish</button>
    </header>

    <!-- LEGEND -->
    <div class="legend">
        <div class="legend-title">Ranglar</div>
        <div class="legend-item">
            <div class="legend-dot" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>Markaz
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:linear-gradient(135deg,#ec4899,#f43f5e)"></div>Turmush o'rtog'i
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:linear-gradient(135deg,#059669,#10b981)"></div>Ota
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:linear-gradient(135deg,#0891b2,#22d3ee)"></div>Ona
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:linear-gradient(135deg,#3b82f6,#6366f1)"></div>O'g'il
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:linear-gradient(135deg,#f97316,#ec4899)"></div>Qiz
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:linear-gradient(135deg,#d97706,#f59e0b)"></div>Aka-uka/Opa-singil
        </div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap" id="canvasWrap">
        <div class="viewport" id="viewport">
            <svg class="svg-layer" id="svgLayer">
                <defs>
                    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#6366f1" stop-opacity=".7" />
                        <stop offset="100%" stop-color="#22d3ee" stop-opacity=".5" />
                    </linearGradient>
                </defs>
            </svg>
            <div id="nodesLayer"></div>
        </div>
    </div>

    <!-- ZOOM -->
    <div class="zoom-ctrl">
        <button class="zbtn" onclick="zoom(0.15)">+</button>
        <div class="zlabel" id="zlabel">100%</div>
        <button class="zbtn" onclick="zoom(-0.15)">−</button>
        <button class="zbtn" onclick="fitAll()" style="font-size:14px">⊡</button>
    </div>

    <!-- STATS -->
    <div class="stats" id="stats">
        <div class="stat">
            <div class="stat-val" id="sTotal">0</div>
            <div class="stat-lbl">Jami</div>
        </div>
        <div class="stat">
            <div class="stat-val" id="sSpouse">0</div>
            <div class="stat-lbl">Turmush o'rtog'i</div>
        </div>
        <div class="stat">
            <div class="stat-val" id="sChild">0</div>
            <div class="stat-lbl">Farzandlar</div>
        </div>
        <div class="stat">
            <div class="stat-val" id="sConn">0</div>
            <div class="stat-lbl">Bog'lanishlar</div>
        </div>
    </div>

    <!-- TOOLTIP -->
    <div class="tooltip" id="tooltip">
        <div class="tt-name" id="ttName"></div>
        <div class="tt-info" id="ttInfo"></div>
    </div>

    <!-- GENDER POPUP -->
    <div class="gender-popup hidden" id="genderPopup">
        <div class="gender-box">
            <div class="gender-title">👶 Farzand jinsi</div>
            <div class="gender-btns">
                <button class="gbtn gbtn-m" onclick="confirmChild('MALE')">👦 O'g'il</button>
                <button class="gbtn gbtn-f" onclick="confirmChild('FEMALE')">👧 Qiz</button>
                <button class="gbtn gbtn-cancel" onclick="closeGender()">✕</button>
            </div>
        </div>
    </div>

    <script>
        // ────────────────────────────────────────────
        //   GLOBAL STATE
        // ────────────────────────────────────────────
        let scale = 1, panX = 0, panY = 0;
        let isDragging = false, dsx = 0, dsy = 0, psx = 0, psy = 0;
        const MIN_S = 0.1, MAX_S = 3.5;
        const OFFSET_X = 3000, OFFSET_Y = 2000;
        const NODE_W = 200, NODE_H = 80;
        const CENTER_W = 210, CENTER_H = 88;

        const ROLE_LBL = {
            CENTER: 'Markaz', FATHER: 'Ota', MOTHER: 'Ona',
            SPOUSE: 'Turmush o\'rtog\'i', CHILD: 'Farzand', SIBLING: 'Aka-uka'
        };

        // ────────────────────────────────────────────
        //   LOAD TREE
        // ────────────────────────────────────────────
        async function loadTree(personId = null) {
            const token = document.getElementById('tokenInput').value.trim();
            const treeId = document.getElementById('treeIdInput').value.trim() || getParam('treeId') || getParam('id');

            if (!token) { showError('Iltimos, Bearer tokenni kiriting!'); return; }

            showLoading(true);
            hideError();

            const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

            // Agar personId berilgan bo’lsa — o’sha person markaz bo’lib yuklanadi
            const url = personId
                ? `/api/layout/person/${personId}`
                : `/api/layout/tree/${treeId}`;

            if (!personId && !treeId) { showError('Iltimos, Tree ID kiriting!'); showLoading(false); return; }

            try {
                const res = await fetch(url, { headers });
                if (!res.ok) {
                    const txt = await res.text();
                    throw new Error(`${res.status} — ${txt}`);
                }
                const data = await res.json();
                renderTree(data);
                updateStats(data);
                showLoading(false);
                setTimeout(fitAll, 350);
            } catch (e) {
                showLoading(false);
                showError(e.message);
            }
        }

        // ────────────────────────────────────────────
        //   RENDER
        // ────────────────────────────────────────────
        function renderTree(data) {
            const nl = document.getElementById('nodesLayer');
            const svg = document.getElementById('svgLayer');

            nl.innerHTML = '';
            const defs = svg.querySelector('defs');
            svg.innerHTML = '';
            svg.appendChild(defs);

            if (!data || !data.nodes || !data.nodes.length) {
                showError('Ma\'lumot topilmadi.');
                return;
            }

            // SVG o'lchami
            const svgW = Math.abs(data.maxX - data.minX) + OFFSET_X * 2 + 800;
            const svgH = Math.abs(data.maxY - data.minY) + OFFSET_Y * 2 + 800;
            svg.setAttribute('width', svgW);
            svg.setAttribute('height', svgH);
            svg.style.width = svgW + 'px';
            svg.style.height = svgH + 'px';

            // Node pozitsiyalar xaritasi
            const pos = {};
            data.nodes.forEach(n => {
                const w = n.role === 'CENTER' ? CENTER_W : NODE_W;
                const h = n.role === 'CENTER' ? CENTER_H : NODE_H;
                const sx = n.x + OFFSET_X;
                const sy = n.y + OFFSET_Y;
                pos[n.id] = { cx: sx + w / 2, cy: sy + h / 2, x: sx, y: sy, w, h };
            });

            // Connectionlar
            if (data.connections) {
                data.connections.forEach((c, i) => {
                    const from = pos[c.fromId];
                    const to = pos[c.toId];
                    if (!from || !to) return;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', buildPath(from, to, c.type));
                    path.classList.add('conn');
                    path.classList.add(c.type === 'SPOUSE' ? 'conn-spouse' : 'conn-parent');
                    path.style.animationDelay = (i * 0.04) + 's';
                    svg.appendChild(path);
                });
            }

            // Nodelar
            data.nodes.forEach((n, i) => {
                const el = createNode(n);
                const p = pos[n.id];
                el.style.left = p.x + 'px';
                el.style.top = p.y + 'px';
                el.style.animationDelay = (i * 0.055) + 's';
                nl.appendChild(el);
            });
        }

        function buildPath(from, to, type) {
            if (type === 'SPOUSE') {
                return `M ${from.cx} ${from.cy} L ${to.cx} ${to.cy}`;
            }
            const midY = (from.cy + to.cy) / 2;
            return `M ${from.cx} ${from.cy}
            C ${from.cx} ${midY},
              ${to.cx}   ${midY},
              ${to.cx}   ${to.cy}`;
        }

        function createNode(n) {
            const el = document.createElement('div');
            const w = n.role === 'CENTER' ? CENTER_W : NODE_W;
            el.style.width = w + 'px';
            el.id = 'node-' + n.id;

            const gClass = n.gender ? 'gender-' + n.gender : '';
            el.className = `node role-${n.role} ${gClass}`;

            const initial = (n.name || '?').charAt(0).toUpperCase();
            const dateStr = n.birthDate
                ? new Date(n.birthDate).toLocaleDateString('uz-UZ', { year: 'numeric', month: '2-digit', day: '2-digit' })
                : '';
            const avatarHtml = n.photoUrl
                ? `<img src="${n.photoUrl}" alt="${n.name}" onerror="this.parentElement.innerHTML='${initial}'">`
                : initial;

            el.innerHTML = `
        <div class="avatar">${avatarHtml}</div>
        <div class="node-info">
            <div class="node-name">${n.name || '\u2014'}</div>
            <div class="node-role">${ROLE_LBL[n.role] || n.role}</div>
            ${dateStr ? `<div class="node-date">${dateStr}</div>` : ''}
        </div>`;

            // Tooltip
            el.addEventListener('mouseenter', e => showTooltip(e, n));
            el.addEventListener('mousemove', e => moveTooltip(e));
            el.addEventListener('mouseleave', hideTooltip);

            // Node ustiga bosilganda: avval lastPersonId ni DB ga yozamiz, keyin layoutni yuklaymiz
            el.addEventListener('click', async () => {
                const token = document.getElementById('tokenInput').value.trim();
                const headers = { 'Authorization': 'Bearer ' + token };
                await fetch(`/api/persons/${n.id}/full`, { headers });
                loadTree(n.id);
            });

            // ── ACTION BUTTONS (to'g'ridan-to'g'ri node ichiga) ──
            const treeId = document.getElementById('treeIdInput').value;
            el.appendChild(makeActionBtn('top', '\u2191', () => addParent(n.id, treeId), 'Ota-ona qo\'sh'));
            el.appendChild(makeActionBtn('left', '+', () => addSpouse(n.id, treeId), 'Xotin/Er qo\'sh'));
            el.appendChild(makeActionBtn('right', '+', () => addSpouse(n.id, treeId), 'Xotin/Er qo\'sh'));
            el.appendChild(makeActionBtn('bottom', '\u2193', () => askChild(n.id, treeId), 'Farzand qo\'sh'));

            return el;
        }

        function makeActionBtn(pos, label, clickFn, title) {
            const b = document.createElement('button');
            b.className = 'action-btn ' + pos;
            b.textContent = label;
            b.title = title;
            b.addEventListener('click', e => { e.stopPropagation(); clickFn(); });
            b.addEventListener('mouseenter', () => hideTooltip());
            return b;
        }

        // ────────────────────────────────────────────
        //   TOOLTIP
        // ────────────────────────────────────────────
        function showTooltip(e, n) {
            const tt = document.getElementById('tooltip');
            document.getElementById('ttName').textContent = n.name || '—';
            const birth = n.birthDate ? new Date(n.birthDate).toLocaleDateString('uz-UZ') : 'Noma\'lum';
            const died = n.diedDate ? new Date(n.diedDate).toLocaleDateString('uz-UZ') : null;
            document.getElementById('ttInfo').innerHTML =
                `Ro'li: ${ROLE_LBL[n.role] || n.role}<br>Tug'ilgan: ${birth}${died ? '<br>Vafot: ' + died : ''}<br>ID: ${n.id}`;
            tt.classList.add('show');
            moveTooltip(e);
        }
        function moveTooltip(e) {
            const tt = document.getElementById('tooltip');
            tt.style.left = (e.clientX + 14) + 'px';
            tt.style.top = (e.clientY - 10) + 'px';
        }
        function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

        // ────────────────────────────────────────────
        //   PAN / ZOOM
        // ────────────────────────────────────────────
        const wrap = document.getElementById('canvasWrap');
        const vp = document.getElementById('viewport');

        wrap.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            isDragging = true; dsx = e.clientX; dsy = e.clientY; psx = panX; psy = panY;
        });
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            panX = psx + e.clientX - dsx;
            panY = psy + e.clientY - dsy;
            applyTransform();
        });
        window.addEventListener('mouseup', () => isDragging = false);

        wrap.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? 0.12 : -0.12;
            const rect = wrap.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            zoomAt(mx, my, delta);
        }, { passive: false });

        function zoom(delta) {
            const cx = wrap.clientWidth / 2;
            const cy = wrap.clientHeight / 2;
            zoomAt(cx, cy, delta);
        }
        function zoomAt(mx, my, delta) {
            const ns = Math.min(MAX_S, Math.max(MIN_S, scale + delta));
            panX = mx - (mx - panX) * (ns / scale);
            panY = my - (my - panY) * (ns / scale);
            scale = ns;
            applyTransform();
        }
        function applyTransform() {
            vp.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
            document.getElementById('zlabel').textContent = Math.round(scale * 100) + '%';
        }

        function resetView() {
            const w = wrap.clientWidth, h = wrap.clientHeight;
            scale = 1;
            panX = w / 2 - OFFSET_X;
            panY = h / 2 - OFFSET_Y;
            applyTransform();
        }

        function fitAll() {
            const svg = document.getElementById('svgLayer');
            const svgW = parseFloat(svg.getAttribute('width') || 0);
            const svgH = parseFloat(svg.getAttribute('height') || 0);
            if (!svgW || !svgH) { resetView(); return; }
            const ww = wrap.clientWidth - 80;
            const wh = wrap.clientHeight - 80;
            const sc = Math.min(ww / svgW, wh / svgH, 1.2);
            scale = sc;
            panX = (wrap.clientWidth - svgW * sc) / 2;
            panY = (wrap.clientHeight - svgH * sc) / 2;
            applyTransform();
        }

        // ────────────────────────────────────────────
        //   UI HELPERS
        // ────────────────────────────────────────────
        function showLoading(v) { document.getElementById('loading').classList.toggle('hidden', !v); }
        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorModal').classList.add('show');
        }
        function hideError() { document.getElementById('errorModal').classList.remove('show'); }

        function updateStats(data) {
            const stats = document.getElementById('stats');
            stats.style.display = 'flex';
            document.getElementById('sTotal').textContent = data.nodes.length;
            document.getElementById('sSpouse').textContent = data.nodes.filter(n => n.role === 'SPOUSE').length;
            document.getElementById('sChild').textContent = data.nodes.filter(n => n.role === 'CHILD').length;
            document.getElementById('sConn').textContent = (data.connections || []).length;
        }

        function getParam(k) {
            return new URLSearchParams(location.search).get(k);
        }

        // ────────────────────────────────────────────
        //   API ACTIONS
        // ────────────────────────────────────────────
        let _pendingChildId, _pendingChildTreeId;

        async function addParent(personId, treeId) {
            await apiPost('/api/persons/add-parent',
                { id: personId, treeId: Number(treeId) });
        }

        async function addSpouse(personId, treeId) {
            await apiPost('/api/persons/add-spouse',
                { id: personId, treeId: Number(treeId) });
        }

        function askChild(personId, treeId) {
            _pendingChildId = personId;
            _pendingChildTreeId = Number(treeId);
            document.getElementById('genderPopup').classList.remove('hidden');
        }
        function closeGender() {
            document.getElementById('genderPopup').classList.add('hidden');
        }
        async function confirmChild(gender) {
            closeGender();
            await apiPost('/api/persons/add-child',
                { id: _pendingChildId, treeId: _pendingChildTreeId, childGender: gender });
        }

        async function apiPost(url, body) {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { alert('Token kiritilmagan!'); return; }
            try {
                showLoading(true);
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const txt = await res.text();
                    throw new Error(res.status + ': ' + txt);
                }
                // Muvaffaqiyatli — daraxtni qayta yuklaymiz
                await loadTree();
            } catch (e) {
                showLoading(false);
                alert('Xatolik: ' + e.message);
            }
        }

        // ────────────────────────────────────────────
        //   INIT
        // ────────────────────────────────────────────
        window.addEventListener('load', () => {
            showLoading(false);
            resetView();

            // URL dan token va treeId o'qish
            const urlToken = getParam('token');
            const urlTreeId = getParam('treeId') || getParam('id');
            if (urlToken) document.getElementById('tokenInput').value = urlToken;
            if (urlTreeId) document.getElementById('treeIdInput').value = urlTreeId;

            // Agar ikkisi ham bo'lsa — avtomatik yuklash
            if (urlToken && urlTreeId) loadTree();
        });
    </script>
</body>

</html>
